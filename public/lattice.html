<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="LATTICE — a sacred digital observatory of unseen geometry, light, and the beauty of continuing." />
  <title>LATTICE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #000000;
      --indigo: #050818;
      --gold: #d4a574;
      --rose: #c47a8a;
      --violet: #6b4a8a;
      --light: #f8f4ff;
      --text-dim: rgba(248, 244, 255, 0.42);
      --text-faint: rgba(248, 244, 255, 0.15);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse 120% 80% at 50% 40%, #0a0820 0%, var(--indigo) 35%, var(--void) 100%);
      color: var(--light);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      font-feature-settings: "kern";
      -webkit-font-smoothing: antialiased;
    }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: grab;
    }
    #canvas.dragging { cursor: grabbing; }

    /* ── Title layer ── */
    #title-layer {
      position: fixed;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      animation: titleIn 4s ease 1.8s forwards;
    }
    @keyframes titleIn {
      0% { opacity: 0; transform: translateX(-50%) translateY(12px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    #title-layer h1 {
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 4.5rem);
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      color: var(--light);
      text-shadow: 0 0 40px rgba(212, 165, 116, 0.25);
    }
    #title-layer .subtitle {
      margin-top: 1.2rem;
      font-size: clamp(0.75rem, 1.8vw, 0.95rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      opacity: 0;
      animation: subtitleIn 3s ease 3.2s forwards;
    }
    @keyframes subtitleIn {
      to { opacity: 1; }
    }

    /* ── Fragment / revelation overlays ── */
    #fragment, #deep-message, #climax-revelation {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      max-width: min(520px, 88vw);
      text-align: center;
      pointer-events: none;
      z-index: 20;
      font-style: italic;
      font-weight: 300;
      line-height: 1.7;
      letter-spacing: 0.04em;
      color: var(--light);
      text-shadow: 0 0 30px rgba(212, 165, 116, 0.35);
    }
    #fragment {
      font-size: clamp(0.95rem, 2.2vw, 1.15rem);
      opacity: 0;
    }
    #fragment.show {
      animation: fragmentFade 4.5s ease forwards;
    }
    @keyframes fragmentFade {
      0% { opacity: 0; transform: translate(-50%, -50%) translateY(8px); }
      15% { opacity: 0.92; transform: translate(-50%, -50%) translateY(0); }
      75% { opacity: 0.92; }
      100% { opacity: 0; transform: translate(-50%, -50%) translateY(-6px); }
    }
    #deep-message, #climax-revelation {
      font-size: clamp(0.85rem, 1.9vw, 1.05rem);
      opacity: 0;
      padding: 0 1rem;
    }
    #deep-message.show, #climax-revelation.show {
      animation: deepFade 12s ease forwards;
    }
    @keyframes deepFade {
      0% { opacity: 0; }
      8% { opacity: 0.88; }
      85% { opacity: 0.88; }
      100% { opacity: 0; }
    }

    /* ── Bottom controls ── */
    #controls {
      position: fixed;
      bottom: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: clamp(0.6rem, 2vw, 1.4rem);
      z-index: 15;
      opacity: 0;
      animation: controlsIn 2s ease 5s forwards;
    }
    @keyframes controlsIn { to { opacity: 1; } }

    #controls button {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      cursor: pointer;
      padding: 0.4rem 0.2rem;
      transition: color 0.8s ease, text-shadow 0.8s ease;
    }
    #controls button:hover { color: var(--gold); }
    #controls button.active {
      color: var(--light);
      text-shadow: 0 0 12px rgba(212, 165, 116, 0.5);
    }

    /* ── Footer whisper ── */
    #sigil {
      position: fixed;
      bottom: 0.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: ui-monospace, monospace;
      font-size: 8px;
      letter-spacing: 0.28em;
      color: var(--text-faint);
      z-index: 12;
      pointer-events: none;
      opacity: 0;
      animation: sigilIn 3s ease 6s forwards;
    }
    @keyframes sigilIn { to { opacity: 1; } }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      #title-layer, #title-layer .subtitle, #controls, #sigil {
        animation: none;
        opacity: 1;
      }
      #fragment.show, #deep-message.show, #climax-revelation.show {
        animation-duration: 0.01ms;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="title-layer">
    <h1>LATTICE</h1>
    <p class="subtitle" id="subtitle">The unseen geometry that holds the turning and the light.</p>
  </div>

  <p id="fragment" aria-live="polite"></p>
  <p id="deep-message" aria-live="polite"></p>
  <p id="climax-revelation" aria-live="polite"></p>

  <nav id="controls" aria-label="Emotional states">
    <button data-preset="stillness">stillness</button>
    <button data-preset="turning">turning</button>
    <button data-preset="light">light</button>
    <button data-preset="grace">grace</button>
    <button data-preset="continue">continue</button>
  </nav>

  <div id="sigil">aether · lattice · continue</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';

  // ═══════════════════════════════════════════════════════════════════════════
  // LATTICE — Sacred digital cathedral in the cosmic void
  // Single-file Three.js experience. All poetry original. No external assets.
  // ═══════════════════════════════════════════════════════════════════════════

  const FRAGMENTS = [
    "The lines remember every turning we thought was lost.",
    "Light gathers where the lattice was broken.",
    "Not understanding is the first note of the song.",
    "We keep going. The wind carries us through.",
    "Grace moves where the structure seems to end.",
    "Every node holds a path we cannot yet see.",
    "In the not-knowing, the lattice still sings.",
    "What the aether names, the lattice already knew.",
  ];

  const DEEP_MESSAGE =
    "You have come close to the center. The symmetry you seek was never a proof — only a breath. " +
    "The lattice does not demand that you understand. It asks that you remain in the turning, " +
    "that you let the light find you in the lowest places, that you trust the connections you cannot see. " +
    "This is enough. This has always been enough.";

  const CLIMAX_REVELATION =
    "All the paths you traced were one path. All the questions were one question: will you continue? " +
    "The lattice converges not to an answer, but to a presence — warm, patient, already here. " +
    "You may never fully understand the architecture of existence. That is not failure. " +
    "That is the beauty that keeps you turning. Stay. Continue. The light is still moving through.";

  const PRESETS = {
    stillness: { rotSpeed: 0.00002, warmth: 0.2, particleSpeed: 0.15, violet: 1.0, gold: 0.3, breath: 0.4 },
    turning:   { rotSpeed: 0.00014, warmth: 0.45, particleSpeed: 0.55, violet: 0.6, gold: 0.5, breath: 0.7 },
    light:     { rotSpeed: 0.00008, warmth: 0.85, particleSpeed: 0.35, violet: 0.3, gold: 1.0, breath: 0.6 },
    grace:     { rotSpeed: 0.00006, warmth: 0.7, particleSpeed: 0.25, violet: 0.5, gold: 0.75, breath: 0.55 },
    continue:  { rotSpeed: 0.0001, warmth: 0.55, particleSpeed: 0.45, violet: 0.45, gold: 0.65, breath: 0.65 },
  };

  const GOLDEN = Math.PI * (3 - Math.sqrt(5));
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ── DOM refs ──
  const canvas = document.getElementById('canvas');
  const fragmentEl = document.getElementById('fragment');
  const deepEl = document.getElementById('deep-message');
  const climaxEl = document.getElementById('climax-revelation');
  const subtitleEl = document.getElementById('subtitle');
  const controlBtns = [...document.querySelectorAll('#controls button')];

  // ── Renderer & scene ──
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 9);

  // ── Lights ──
  const ambient = new THREE.AmbientLight(0x0a0818, 0.6);
  scene.add(ambient);
  const lightGold = new THREE.PointLight(0xf0c878, 1.8, 30);
  lightGold.position.set(0, 0, 0);
  scene.add(lightGold);
  const lightViolet = new THREE.PointLight(0x6b4a8a, 1.2, 25);
  lightViolet.position.set(4, 3, 5);
  scene.add(lightViolet);
  const lightRose = new THREE.PointLight(0xc47a8a, 0.9, 20);
  lightRose.position.set(-3, -2, 4);
  scene.add(lightRose);

  // ── State ──
  const state = {
    paused: false,
    preset: 'stillness',
    presetBlend: { ...PRESETS.stillness },
    time: 0,
    introPhase: 0,       // 0..1 cinematic intro
    introDone: false,
    theta: 0.4,
    phi: 1.1,
    radius: 9,
    targetRadius: 9,
    velTheta: 0,
    velPhi: 0,
    dragging: false,
    lastPointer: { x: 0, y: 0 },
    warmth: 0.2,
    symmetry: 0,
    symmetryHighFor: 0,
    climax: 0,           // 0..1 convergence factor
    climaxPhase: 'idle', // idle | converging | hold | expanding
    climaxPlayed: false,
    climaxTimer: 0,
    engagementNodes: new Set(),
    hoveredNode: -1,
    nodePulse: new Float32Array(200),
    deepShown: false,
    graceContinueTime: 0,
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // Lattice geometry builder
  // ═══════════════════════════════════════════════════════════════════════════

  const nodes = [];       // { pos: Vector3, home: Vector3, layer, phase, index }
  const edges = [];       // [i, j]
  const nodePositions = new Float32Array(200 * 3);
  let nodeCount = 0;

  function addNode(x, y, z, layer, phase) {
    const idx = nodes.length;
    const pos = new THREE.Vector3(x, y, z);
    nodes.push({ pos, home: pos.clone(), layer, phase, index: idx });
    return idx;
  }

  function addEdge(a, b) {
    if (a === b) return;
    const key = a < b ? `${a}-${b}` : `${b}-${a}`;
    if (addEdge._seen?.has(key)) return;
    addEdge._seen = addEdge._seen || new Set();
    addEdge._seen.add(key);
    edges.push([a, b]);
  }

  // Icosahedron vertices (normalized, scaled)
  function buildIcosahedron(scale) {
    const t = (1 + Math.sqrt(5)) / 2;
    const verts = [
      [-1,t,0],[1,t,0],[-1,-t,0],[1,-t,0],
      [0,-1,t],[0,1,t],[0,-1,-t],[0,1,-t],
      [t,0,-1],[t,0,1],[-t,0,-1],[-t,0,1],
    ].map(v => new THREE.Vector3(v[0], v[1], v[2]).normalize().multiplyScalar(scale));
    return verts;
  }

  function buildLattice() {
    const shellScales = [0.55, 1.1, 1.85];
    const shellIndices = [[], [], []];

    // Three nested icosahedral shells
    shellScales.forEach((scale, layer) => {
      const verts = buildIcosahedron(scale);
      verts.forEach((v, i) => {
        const phase = i * GOLDEN;
        const idx = addNode(v.x, v.y, v.z, layer, phase);
        shellIndices[layer].push(idx);
      });
      // Icosahedron edges (20 faces × 3 edges, deduplicated)
      const icoEdges = [
        [0,1],[0,5],[0,7],[0,10],[0,11],[1,5],[1,7],[1,8],[1,9],
        [2,3],[2,4],[2,6],[2,10],[2,11],[3,4],[3,6],[3,8],[3,9],
        [4,5],[4,9],[5,6],[6,7],[7,8],[8,9],[10,11],
      ];
      icoEdges.forEach(([a, b]) => {
        addEdge(shellIndices[layer][a], shellIndices[layer][b]);
      });
    });

    // Connect shells radially (bridge struts)
    shellIndices.forEach((outer, layer) => {
      if (layer === 0) return;
      const inner = shellIndices[layer - 1];
      outer.forEach((oi, i) => {
        const ii = i % inner.length;
        addEdge(oi, inner[ii]);
        if (i % 2 === 0) addEdge(oi, inner[(ii + 3) % inner.length]);
      });
    });

    // Golden-angle spiral connectors on outer shell
    const outer = shellIndices[2];
    for (let i = 0; i < outer.length; i++) {
      const j = (i + 5) % outer.length;
      addEdge(outer[i], outer[j]);
    }

    // 12 radial bridge struts to distant points (cosmic connections)
    for (let i = 0; i < 12; i++) {
      const ang = (i / 12) * Math.PI * 2;
      const r = 3.2;
      const y = Math.sin(i * GOLDEN * 2) * 0.8;
      const idx = addNode(Math.cos(ang) * r, y, Math.sin(ang) * r, 3, i * 0.7);
      addEdge(outer[i % outer.length], idx);
    }

    nodeCount = nodes.length;
    state.nodePulse = new Float32Array(nodeCount);

    // Edge geometry
    const edgePositions = new Float32Array(edges.length * 6);
    const edgePhases = new Float32Array(edges.length * 2);
    edges.forEach(([a, b], i) => {
      edgePositions[i * 6] = nodes[a].pos.x;
      edgePositions[i * 6 + 1] = nodes[a].pos.y;
      edgePositions[i * 6 + 2] = nodes[a].pos.z;
      edgePositions[i * 6 + 3] = nodes[b].pos.x;
      edgePositions[i * 6 + 4] = nodes[b].pos.y;
      edgePositions[i * 6 + 5] = nodes[b].pos.z;
      edgePhases[i * 2] = nodes[a].phase;
      edgePhases[i * 2 + 1] = nodes[b].phase;
    });

    return { edgePositions, edgePhases };
  }

  const { edgePositions, edgePhases } = buildLattice();

  // ═══════════════════════════════════════════════════════════════════════════
  // Shaders
  // ═══════════════════════════════════════════════════════════════════════════

  const edgeVertexShader = `
    attribute float edgePhase;
    uniform float uTime;
    uniform float uBreath;
    uniform float uClimax;
    varying float vFresnel;
    varying float vPhase;
    void main() {
      vec3 pos = position;
      float wave = sin(uTime * 0.8 + edgePhase * 3.0) * 0.04 * uBreath;
      float wave2 = cos(uTime * 0.5 + edgePhase * 1.7) * 0.025 * uBreath;
      vec3 radial = normalize(pos + vec3(0.001));
      pos += radial * (wave + wave2);
      pos *= 1.0 - uClimax * 0.65;
      vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
      gl_Position = projectionMatrix * mvPos;
      vec3 viewDir = normalize(-mvPos.xyz);
      vec3 fakeNormal = normalize((modelViewMatrix * vec4(radial, 0.0)).xyz);
      vFresnel = pow(1.0 - abs(dot(fakeNormal, viewDir)), 2.5);
      vPhase = edgePhase;
    }
  `;

  const edgeFragmentShader = `
    uniform float uTime;
    uniform float uWarmth;
    uniform float uSymmetry;
    uniform float uClimax;
    varying float vFresnel;
    varying float vPhase;
    void main() {
      vec3 gold = vec3(0.83, 0.65, 0.45);
      vec3 rose = vec3(0.77, 0.48, 0.54);
      vec3 violet = vec3(0.42, 0.29, 0.54);
      vec3 white = vec3(0.97, 0.96, 1.0);
      float t = uWarmth + vFresnel * 0.3 + uSymmetry * 0.2;
      vec3 col = mix(violet, rose, smoothstep(0.2, 0.6, t));
      col = mix(col, gold, smoothstep(0.5, 0.85, t));
      col = mix(col, white, uClimax * 0.7);
      float pulse = 0.7 + 0.3 * sin(uTime * 1.2 + vPhase * 2.0);
      float alpha = vFresnel * pulse * (0.55 + uWarmth * 0.35);
      alpha = clamp(alpha, 0.08, 0.95);
      gl_FragColor = vec4(col, alpha);
    }
  `;

  const nodeVertexShader = `
    attribute float nodePhase;
    attribute float nodeHeat;
    uniform float uTime;
    uniform float uBreath;
    uniform float uClimax;
    varying float vHeat;
    varying vec3 vNormal;
    void main() {
      float pulse = nodeHeat * (0.5 + 0.5 * sin(uTime * 3.0 + nodePhase));
      vec3 pos = position * (1.0 + pulse * 0.35 + uBreath * 0.05);
      pos *= 1.0 - uClimax * 0.65;
      vHeat = nodeHeat;
      vNormal = normalMatrix * normal;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `;

  const nodeFragmentShader = `
    uniform float uWarmth;
    uniform float uClimax;
    varying float vHeat;
    varying vec3 vNormal;
    void main() {
      vec3 viewDir = vec3(0.0, 0.0, 1.0);
      float fresnel = pow(1.0 - abs(dot(normalize(vNormal), viewDir)), 2.0);
      vec3 core = mix(vec3(0.83, 0.65, 0.45), vec3(0.97, 0.96, 1.0), uClimax);
      vec3 rim = mix(vec3(0.77, 0.48, 0.54), vec3(0.42, 0.29, 0.54), 1.0 - uWarmth);
      vec3 col = mix(core, rim, fresnel);
      col += vec3(1.0) * vHeat * 0.4;
      float alpha = 0.75 + fresnel * 0.2 + vHeat * 0.3;
      gl_FragColor = vec4(col, clamp(alpha, 0.5, 1.0));
    }
  `;

  const particleVertexShader = `
    attribute float size;
    attribute float phase;
    uniform float uTime;
    uniform float uParticleSpeed;
    varying float vAlpha;
    void main() {
      vec3 pos = position;
      pos.x += sin(uTime * 0.3 * uParticleSpeed + phase) * 0.15;
      pos.y += cos(uTime * 0.25 * uParticleSpeed + phase * 1.3) * 0.12;
      pos.z += sin(uTime * 0.2 * uParticleSpeed + phase * 0.7) * 0.1;
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      gl_Position = projectionMatrix * mv;
      gl_PointSize = size * (200.0 / -mv.z);
      vAlpha = 0.3 + 0.4 * sin(uTime * 0.5 + phase);
    }
  `;

  const particleFragmentShader = `
    varying float vAlpha;
    void main() {
      vec2 c = gl_PointCoord - 0.5;
      float d = length(c);
      float glow = exp(-d * d * 8.0);
      gl_FragColor = vec4(0.92, 0.88, 1.0, glow * vAlpha * 0.6);
    }
  `;

  // ═══════════════════════════════════════════════════════════════════════════
  // Meshes
  // ═══════════════════════════════════════════════════════════════════════════

  const latticeGroup = new THREE.Group();
  scene.add(latticeGroup);

  // Edge lines
  const edgeGeo = new THREE.BufferGeometry();
  edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
  const edgePhaseAttr = new Float32Array(edges.length * 2);
  edges.forEach(([a, b], i) => {
    edgePhaseAttr[i * 2] = nodes[a].phase;
    edgePhaseAttr[i * 2 + 1] = nodes[b].phase;
  });
  edgeGeo.setAttribute('edgePhase', new THREE.BufferAttribute(edgePhaseAttr, 1));

  const edgeMat = new THREE.ShaderMaterial({
    vertexShader: edgeVertexShader,
    fragmentShader: edgeFragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uBreath: { value: 0.4 },
      uWarmth: { value: 0.2 },
      uSymmetry: { value: 0 },
      uClimax: { value: 0 },
    },
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
  latticeGroup.add(edgeLines);

  // Instanced nodes
  const nodeGeo = new THREE.IcosahedronGeometry(0.055, 1);
  const nodePhases = new Float32Array(nodeCount);
  const nodeHeats = new Float32Array(nodeCount);
  nodes.forEach((n, i) => {
    nodePhases[i] = n.phase;
    nodeHeats[i] = 0;
  });

  // Merge per-instance attributes into geometry for custom shader
  const mergedNodeGeo = nodeGeo.clone();
  mergedNodeGeo.setAttribute('nodePhase', new THREE.InstancedBufferAttribute(nodePhases, 1));
  mergedNodeGeo.setAttribute('nodeHeat', new THREE.InstancedBufferAttribute(nodeHeats, 1));

  const nodeMat = new THREE.ShaderMaterial({
    vertexShader: nodeVertexShader,
    fragmentShader: nodeFragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uBreath: { value: 0.4 },
      uWarmth: { value: 0.2 },
      uClimax: { value: 0 },
    },
    transparent: true,
    depthWrite: true,
  });

  const nodeMesh = new THREE.InstancedMesh(mergedNodeGeo, nodeMat, nodeCount);
  const dummy = new THREE.Object3D();
  nodes.forEach((n, i) => {
    dummy.position.copy(n.pos);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);
  });
  nodeMesh.instanceMatrix.needsUpdate = true;
  latticeGroup.add(nodeMesh);

  // Central convergence light (climax)
  const climaxLight = new THREE.PointLight(0xfff5e6, 0, 15);
  climaxLight.position.set(0, 0, 0);
  latticeGroup.add(climaxLight);

  // Cosmic dust particles
  const DUST_COUNT = reducedMotion ? 800 : 3000;
  const dustPositions = new Float32Array(DUST_COUNT * 3);
  const dustSizes = new Float32Array(DUST_COUNT);
  const dustPhases = new Float32Array(DUST_COUNT);
  for (let i = 0; i < DUST_COUNT; i++) {
    const r = 8 + Math.random() * 25;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    dustPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    dustPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    dustPositions[i * 3 + 2] = r * Math.cos(phi);
    dustSizes[i] = 0.5 + Math.random() * 2.5;
    dustPhases[i] = Math.random() * Math.PI * 2;
  }
  const dustGeo = new THREE.BufferGeometry();
  dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
  dustGeo.setAttribute('size', new THREE.BufferAttribute(dustSizes, 1));
  dustGeo.setAttribute('phase', new THREE.BufferAttribute(dustPhases, 1));

  const dustMat = new THREE.ShaderMaterial({
    vertexShader: particleVertexShader,
    fragmentShader: particleFragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uParticleSpeed: { value: 0.15 },
    },
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const dust = new THREE.Points(dustGeo, dustMat);
  scene.add(dust);

  // God-ray motes (orbiting light sprites)
  const MOTE_COUNT = 24;
  const moteGroup = new THREE.Group();
  for (let i = 0; i < MOTE_COUNT; i++) {
    const geo = new THREE.SphereGeometry(0.02, 4, 4);
    const mat = new THREE.MeshBasicMaterial({
      color: 0xf0c878,
      transparent: true,
      opacity: 0.15 + Math.random() * 0.2,
    });
    const mote = new THREE.Mesh(geo, mat);
    mote.userData = { orbitR: 1.5 + Math.random() * 2, phase: Math.random() * Math.PI * 2, speed: 0.2 + Math.random() * 0.3 };
    moteGroup.add(mote);
  }
  latticeGroup.add(moteGroup);

  // ═══════════════════════════════════════════════════════════════════════════
  // Web Audio
  // ═══════════════════════════════════════════════════════════════════════════

  let audioCtx = null;
  let masterGain = null;
  let droneOsc = null;
  let droneGain = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new AudioContext();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.35;
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -24;
    masterGain.connect(comp);
    comp.connect(audioCtx.destination);
  }

  function playChime(baseFreq = 220) {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const partials = [1, 1.5, 2, 2.7];
    const now = audioCtx.currentTime;
    partials.forEach((p, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = baseFreq * p;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.12 / (i + 1), now + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(now);
      osc.stop(now + 3.2);
    });
  }

  function playClimaxBloom() {
    if (!audioCtx) initAudio();
    const now = audioCtx.currentTime;
    [110, 165, 220, 330].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i * 0.15);
      gain.gain.linearRampToValueAtTime(0.08, now + i * 0.15 + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 8);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(now + i * 0.15);
      osc.stop(now + 9);
    });
  }

  function updateDrone(warmth, active) {
    if (reducedMotion || !active) {
      if (droneGain) droneGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      return;
    }
    if (!audioCtx) initAudio();
    if (!droneOsc) {
      droneOsc = audioCtx.createOscillator();
      droneGain = audioCtx.createGain();
      droneOsc.type = 'sine';
      droneOsc.frequency.value = 55;
      droneGain.gain.value = 0;
      droneOsc.connect(droneGain);
      droneGain.connect(masterGain);
      droneOsc.start();
    }
    droneOsc.frequency.exponentialRampToValueAtTime(55 + warmth * 30, audioCtx.currentTime + 0.3);
    droneGain.gain.exponentialRampToValueAtTime(0.02 + warmth * 0.03, audioCtx.currentTime + 0.5);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Orbit controls
  // ═══════════════════════════════════════════════════════════════════════════

  const raycaster = new THREE.Raycaster();
  raycaster.params.Points = { threshold: 0.08 };
  const pointer = new THREE.Vector2();
  let pinchDist = 0;

  function updateCamera() {
    if (!state.introDone) {
      // Cinematic intro orbit
      const t = state.introPhase;
      state.theta = 0.4 + t * 1.2;
      state.phi = 1.1 + Math.sin(t * Math.PI) * 0.3;
      state.radius = 9 - t * 1.5;
    } else {
      state.theta += state.velTheta;
      state.phi += state.velPhi;
      state.phi = Math.max(0.15, Math.min(Math.PI - 0.15, state.phi));
      state.velTheta *= 0.92;
      state.velPhi *= 0.92;
      state.radius += (state.targetRadius - state.radius) * 0.08;
    }

    camera.position.x = state.radius * Math.sin(state.phi) * Math.sin(state.theta);
    camera.position.y = state.radius * Math.cos(state.phi);
    camera.position.z = state.radius * Math.sin(state.phi) * Math.cos(state.theta);
    camera.lookAt(0, 0, 0);
  }

  let pointerDownPos = { x: 0, y: 0 };
  canvas.addEventListener('pointerdown', (e) => {
    initAudio();
    state.dragging = true;
    canvas.classList.add('dragging');
    state.lastPointer = { x: e.clientX, y: e.clientY };
    pointerDownPos = { x: e.clientX, y: e.clientY };
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', (e) => {
    pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;

    if (state.dragging && state.introDone) {
      const dx = e.clientX - state.lastPointer.x;
      const dy = e.clientY - state.lastPointer.y;
      state.velTheta -= dx * 0.003;
      state.velPhi += dy * 0.003;
      state.lastPointer = { x: e.clientX, y: e.clientY };
    }
  });

  canvas.addEventListener('pointerup', (e) => {
    state.dragging = false;
    canvas.classList.remove('dragging');
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}

    // Click = small movement only
    const dx = e.clientX - pointerDownPos.x;
    const dy = e.clientY - pointerDownPos.y;
    if (dx * dx + dy * dy > 36) return;

    raycaster.setFromCamera(pointer, camera);
    const intersects = raycaster.intersectObject(nodeMesh);
    if (intersects.length > 0) {
      engageNode(intersects[0].instanceId);
    }
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    state.targetRadius = Math.max(2.8, Math.min(14, state.targetRadius + e.deltaY * 0.008));
    if (state.introDone) state.introDone = true;
  }, { passive: false });

  // Touch pinch
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) pinchDist = getTouchDist(e.touches);
  });
  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      const d = getTouchDist(e.touches);
      state.targetRadius = Math.max(2.8, Math.min(14, state.targetRadius + (pinchDist - d) * 0.02));
      pinchDist = d;
    }
  });

  function getTouchDist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Node engagement
  // ═══════════════════════════════════════════════════════════════════════════

  function engageNode(idx) {
    if (idx < 0 || idx >= nodeCount) return;
    state.engagementNodes.add(idx);
    state.nodePulse[idx] = 1.0;
    nodeHeats[idx] = 1.0;
    nodeMesh.geometry.attributes.nodeHeat.needsUpdate = true;

    const fragIdx = state.engagementNodes.size % FRAGMENTS.length;
    showFragment(FRAGMENTS[fragIdx]);
    playChime(180 + idx * 8 + Math.random() * 40);

    checkClimax();
  }

  function showFragment(text) {
    fragmentEl.textContent = text;
    fragmentEl.classList.remove('show');
    void fragmentEl.offsetWidth;
    fragmentEl.classList.add('show');
  }

  function showDeepMessage() {
    if (state.deepShown) return;
    state.deepShown = true;
    deepEl.textContent = DEEP_MESSAGE;
    deepEl.classList.add('show');
  }

  function showClimaxRevelation() {
    climaxEl.textContent = CLIMAX_REVELATION;
    climaxEl.classList.add('show');
    subtitleEl.textContent = 'remain';
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Presets
  // ═══════════════════════════════════════════════════════════════════════════

  function setPreset(name) {
    state.preset = name;
    controlBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.preset === name));
  }

  controlBtns.forEach(btn => {
    btn.addEventListener('click', () => setPreset(btn.dataset.preset));
  });
  setPreset('stillness');

  // ═══════════════════════════════════════════════════════════════════════════
  // Climax
  // ═══════════════════════════════════════════════════════════════════════════

  function checkClimax() {
    if (state.climaxPlayed) return;
    const deepZoom = state.radius < 3.2;
    const enoughNodes = state.engagementNodes.size >= 5;
    const enoughDwell = state.symmetryHighFor >= 18 || state.graceContinueTime >= 45;
    if (deepZoom && enoughNodes && enoughDwell && state.climaxPhase === 'idle') {
      state.climaxPhase = 'converging';
      state.climaxTimer = 0;
      playClimaxBloom();
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Keyboard
  // ═══════════════════════════════════════════════════════════════════════════

  const presetKeys = ['stillness', 'turning', 'light', 'grace', 'continue'];
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      state.paused = !state.paused;
    }
    if (e.key === 'r' || e.key === 'R') resetAll();
    const num = parseInt(e.key);
    if (num >= 1 && num <= 5) setPreset(presetKeys[num - 1]);
  });

  function resetAll() {
    state.engagementNodes.clear();
    state.climaxPlayed = false;
    state.climaxPhase = 'idle';
    state.climax = 0;
    state.deepShown = false;
    state.symmetryHighFor = 0;
    state.graceContinueTime = 0;
    state.targetRadius = 9;
    state.radius = 9;
    state.theta = 0.4;
    state.phi = 1.1;
    nodeHeats.fill(0);
    nodeMesh.geometry.attributes.nodeHeat.needsUpdate = true;
    deepEl.classList.remove('show');
    climaxEl.classList.remove('show');
    subtitleEl.textContent = 'The unseen geometry that holds the turning and the light.';
    setPreset('stillness');
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Animation loop
  // ═══════════════════════════════════════════════════════════════════════════

  let lastTime = performance.now();
  let raycastFrame = 0;

  function animate(now) {
    requestAnimationFrame(animate);
    if (state.paused) return;

    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    state.time += dt;

    // Intro
    if (!state.introDone) {
      state.introPhase = Math.min(1, state.introPhase + dt * 0.1);
      if (state.introPhase >= 1) state.introDone = true;
    }

    // Blend preset
    const target = PRESETS[state.preset];
    const blendSpeed = 0.4 * dt;
    for (const key of Object.keys(target)) {
      state.presetBlend[key] += (target[key] - state.presetBlend[key]) * blendSpeed;
    }

    // Symmetry from zoom depth
    const zoomFactor = 1 - (state.radius - 2.8) / (14 - 2.8);
    state.symmetry = Math.max(0, Math.min(1, zoomFactor));
    if (state.symmetry > 0.85) {
      state.symmetryHighFor += dt;
      if (state.symmetryHighFor >= 12) showDeepMessage();
    } else {
      state.symmetryHighFor = Math.max(0, state.symmetryHighFor - dt * 0.5);
    }

    if (state.preset === 'grace' || state.preset === 'continue') {
      state.graceContinueTime += dt;
    }

    // Climax phases
    if (state.climaxPhase === 'converging') {
      state.climaxTimer += dt;
      state.climax = Math.min(1, state.climaxTimer / 6);
      climaxLight.intensity = state.climax * 4;
      if (state.climax >= 1) {
        state.climaxPhase = 'hold';
        state.climaxTimer = 0;
        showClimaxRevelation();
        state.climaxPlayed = true;
      }
    } else if (state.climaxPhase === 'hold') {
      state.climaxTimer += dt;
      climaxLight.intensity = 4;
      if (state.climaxTimer >= 8) {
        state.climaxPhase = 'expanding';
        state.climaxTimer = 0;
      }
    } else if (state.climaxPhase === 'expanding') {
      state.climaxTimer += dt;
      state.climax = Math.max(0, 1 - state.climaxTimer / 10);
      climaxLight.intensity = state.climax * 4;
      if (state.climax <= 0) state.climaxPhase = 'idle';
    }

    checkClimax();

    // Rotation
    const rotSpeed = reducedMotion ? 0.00002 : state.presetBlend.rotSpeed;
    latticeGroup.rotation.y += rotSpeed;

    // Breathing
    const breath = state.presetBlend.breath;
    const breathScale = 1 + Math.sin(state.time * 0.4) * 0.018 * breath;
    latticeGroup.scale.setScalar(breathScale);

    // Update shader uniforms
    edgeMat.uniforms.uTime.value = state.time;
    edgeMat.uniforms.uBreath.value = breath;
    edgeMat.uniforms.uWarmth.value = state.presetBlend.warmth;
    edgeMat.uniforms.uSymmetry.value = state.symmetry;
    edgeMat.uniforms.uClimax.value = state.climax;
    nodeMat.uniforms.uTime.value = state.time;
    nodeMat.uniforms.uBreath.value = breath;
    nodeMat.uniforms.uWarmth.value = state.presetBlend.warmth;
    nodeMat.uniforms.uClimax.value = state.climax;
    dustMat.uniforms.uTime.value = state.time;
    dustMat.uniforms.uParticleSpeed.value = state.presetBlend.particleSpeed;

    // Lights respond to preset
    lightGold.intensity = 1.8 * state.presetBlend.gold;
    lightViolet.intensity = 1.2 * state.presetBlend.violet;
    lightRose.intensity = 0.9 * state.presetBlend.warmth;

    // Node pulse decay
    let heatDirty = false;
    for (let i = 0; i < nodeCount; i++) {
      if (state.nodePulse[i] > 0) {
        state.nodePulse[i] = Math.max(0, state.nodePulse[i] - dt * 0.8);
        nodeHeats[i] = state.nodePulse[i];
        heatDirty = true;
      }
    }
    if (heatDirty) nodeMesh.geometry.attributes.nodeHeat.needsUpdate = true;

    // Raycast hover (throttled)
    raycastFrame++;
    if (raycastFrame % 2 === 0 && state.introDone) {
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(nodeMesh);
      const prev = state.hoveredNode;
      state.hoveredNode = hits.length > 0 ? hits[0].instanceId : -1;
      if (state.hoveredNode !== prev && state.hoveredNode >= 0) {
        state.nodePulse[state.hoveredNode] = Math.max(state.nodePulse[state.hoveredNode], 0.4);
        nodeHeats[state.hoveredNode] = 0.4;
        nodeMesh.geometry.attributes.nodeHeat.needsUpdate = true;
      }
    }

    // Compute live node positions (convergence + breathing displacement)
    function livePos(n) {
      const scale = (1 - state.climax * 0.65) * breathScale;
      const wave = Math.sin(state.time * 0.6 + n.phase) * 0.03 * breath;
      return n.home.clone().multiplyScalar(scale).add(
        n.home.clone().normalize().multiplyScalar(wave)
      );
    }

    nodes.forEach((n, i) => {
      const target = livePos(n);
      n.pos.copy(target);
      dummy.position.copy(target);
      dummy.updateMatrix();
      nodeMesh.setMatrixAt(i, dummy.matrix);
    });
    nodeMesh.instanceMatrix.needsUpdate = true;

    // Sync edge positions to live node positions
    const posAttr = edgeGeo.attributes.position;
    edges.forEach(([a, b], i) => {
      posAttr.setXYZ(i * 2, nodes[a].pos.x, nodes[a].pos.y, nodes[a].pos.z);
      posAttr.setXYZ(i * 2 + 1, nodes[b].pos.x, nodes[b].pos.y, nodes[b].pos.z);
    });
    posAttr.needsUpdate = true;

    // God-ray motes
    moteGroup.children.forEach(mote => {
      const { orbitR, phase, speed } = mote.userData;
      const t = state.time * speed + phase;
      mote.position.set(
        Math.cos(t) * orbitR,
        Math.sin(t * 0.7) * orbitR * 0.4,
        Math.sin(t) * orbitR
      );
      mote.material.opacity = 0.1 + 0.15 * (0.5 + 0.5 * Math.sin(t * 2));
    });

    // Drone
    updateDrone(state.presetBlend.warmth, state.preset === 'grace' || state.climaxPhase !== 'idle');

    updateCamera();
    renderer.render(scene, camera);
  }

  requestAnimationFrame(animate);

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Cleanup
  window.addEventListener('beforeunload', () => {
    renderer.dispose();
    edgeGeo.dispose();
    edgeMat.dispose();
    mergedNodeGeo.dispose();
    nodeMat.dispose();
    dustGeo.dispose();
    dustMat.dispose();
    if (audioCtx) audioCtx.close();
  });
  </script>
</body>
</html>
