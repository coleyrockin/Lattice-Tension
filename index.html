<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="LATTICE — a sacred digital observatory of unseen geometry, light, and the beauty of continuing." />
  <title>LATTICE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #000000;
      --indigo: #050818;
      --gold: #d4a574;
      --rose: #c47a8a;
      --violet: #6b4a8a;
      --light: #f8f4ff;
      --text-dim: rgba(248, 244, 255, 0.42);
      --text-faint: rgba(248, 244, 255, 0.15);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--light);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      font-feature-settings: "kern";
      -webkit-font-smoothing: antialiased;
    }

    #aurora {
      position: fixed;
      inset: -20%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.7;
      background:
        radial-gradient(ellipse 50% 30% at 22% 28%, rgba(107,74,138,0.14) 0%, transparent 70%),
        radial-gradient(ellipse 40% 25% at 76% 20%, rgba(196,122,138,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 120% 80% at 50% 42%, #08061a 0%, var(--indigo) 40%, var(--void) 100%);
      animation: auroraDrift 28s ease-in-out infinite alternate;
    }
    @keyframes auroraDrift {
      0% { transform: translate(0, 0) scale(1); opacity: 0.85; }
      50% { transform: translate(2%, -1.5%) scale(1.03); opacity: 1; }
      100% { transform: translate(-1.5%, 2%) scale(1.01); opacity: 0.9; }
    }

    #lens-overlay {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse 75% 65% at 50% 48%, transparent 22%, rgba(0,0,0,0.72) 100%);
    }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: grab;
      z-index: 2;
    }
    #canvas.dragging { cursor: grabbing; }

    /* ── Title layer ── */
    #title-layer {
      position: fixed;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      animation: titleIn 4s ease 1.8s forwards;
    }
    @keyframes titleIn {
      0% { opacity: 0; transform: translateX(-50%) translateY(12px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    #title-layer h1 {
      font-weight: 200;
      font-size: clamp(2.2rem, 7vw, 5rem);
      letter-spacing: 0.42em;
      text-indent: 0.42em;
      background: linear-gradient(180deg, #fff 0%, var(--gold) 50%, #e8d4b8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 2px 18px rgba(0,0,0,0.9)) drop-shadow(0 0 32px rgba(212, 165, 116, 0.28));
    }
    @keyframes titleShimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    #title-layer .subtitle {
      margin-top: 1.2rem;
      font-size: clamp(0.75rem, 1.8vw, 0.95rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      opacity: 0;
      animation: subtitleIn 3s ease 3.2s forwards;
    }
    @keyframes subtitleIn {
      to { opacity: 1; }
    }

    /* ── Fragment / revelation overlays ── */
    #fragment, #deep-message, #climax-revelation {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      max-width: min(520px, 88vw);
      text-align: center;
      pointer-events: none;
      z-index: 20;
      font-style: italic;
      font-weight: 300;
      line-height: 1.7;
      letter-spacing: 0.04em;
      color: var(--light);
      text-shadow: 0 0 30px rgba(212, 165, 116, 0.35);
    }
    #fragment {
      font-size: clamp(0.95rem, 2.2vw, 1.15rem);
      opacity: 0;
    }
    #fragment.show {
      animation: fragmentFade 4.5s ease forwards;
    }
    @keyframes fragmentFade {
      0% { opacity: 0; transform: translate(-50%, -50%) translateY(8px); }
      15% { opacity: 0.92; transform: translate(-50%, -50%) translateY(0); }
      75% { opacity: 0.92; }
      100% { opacity: 0; transform: translate(-50%, -50%) translateY(-6px); }
    }
    #deep-message, #climax-revelation {
      font-size: clamp(0.85rem, 1.9vw, 1.05rem);
      opacity: 0;
      padding: 0 1rem;
    }
    #deep-message.show, #climax-revelation.show {
      animation: deepFade 12s ease forwards;
    }
    @keyframes deepFade {
      0% { opacity: 0; }
      8% { opacity: 0.88; }
      85% { opacity: 0.88; }
      100% { opacity: 0; }
    }

    /* ── Bottom controls ── */
    #controls {
      position: fixed;
      bottom: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: clamp(0.6rem, 2vw, 1.4rem);
      z-index: 15;
      opacity: 0;
      animation: controlsIn 2s ease 5s forwards;
    }
    @keyframes controlsIn { to { opacity: 1; } }

    #controls button {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      cursor: pointer;
      padding: 0.4rem 0.2rem;
      transition: color 0.8s ease, text-shadow 0.8s ease;
    }
    #controls button:hover { color: var(--gold); }
    #controls button.active {
      color: var(--light);
      text-shadow: 0 0 12px rgba(212, 165, 116, 0.5);
    }

    /* ── Footer whisper ── */
    #sigil {
      position: fixed;
      bottom: 0.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: ui-monospace, monospace;
      font-size: 8px;
      letter-spacing: 0.28em;
      color: var(--text-faint);
      z-index: 12;
      pointer-events: none;
      opacity: 0;
      animation: sigilIn 3s ease 6s forwards;
    }
    @keyframes sigilIn { to { opacity: 1; } }

    #fragment-holo {
      position: fixed;
      pointer-events: none;
      z-index: 25;
      opacity: 0;
      padding: 1.1rem 1.5rem;
      max-width: min(400px, 85vw);
      border: 1px solid rgba(212, 165, 116, 0.32);
      box-shadow: 0 0 40px rgba(212,165,116,0.12), inset 0 0 30px rgba(107,74,138,0.08);
      background: linear-gradient(135deg, rgba(107,74,138,0.22), rgba(5,8,24,0.78));
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      clip-path: polygon(0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px));
    }
    #fragment-holo::before, #fragment-holo::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: rgba(212,165,116,0.55);
      border-style: solid;
      pointer-events: none;
    }
    #fragment-holo::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
    #fragment-holo::after { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }
    #fragment-holo.show { animation: holoIn 5s ease forwards; }
    @keyframes holoIn {
      0% { opacity: 0; filter: blur(6px); transform: translate(-50%, -50%) scale(0.94); }
      12% { opacity: 1; filter: blur(0); transform: translate(-50%, -50%) scale(1); }
      72% { opacity: 0.95; }
      100% { opacity: 0; filter: blur(3px); transform: translate(-50%, -58%) scale(0.98); }
    }
    #fragment-holo .holo-text {
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      line-height: 1.65;
      letter-spacing: 0.04em;
      color: var(--light);
      text-shadow: 0 0 24px rgba(212, 165, 116, 0.4);
    }
    #fragment-holo .holo-coords {
      display: block;
      margin-top: 0.6rem;
      font-family: ui-monospace, monospace;
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--text-faint);
    }
    #fragment-holo .holo-scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.025) 2px, rgba(255,255,255,0.025) 4px);
      animation: scan 4s linear infinite;
    }
    @keyframes scan { to { background-position: 0 40px; } }

    #climax-flash {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,248,235,0.55) 0%, transparent 65%);
    }
    #climax-flash.active { animation: flashPulse 1.2s ease-out forwards; }
    @keyframes flashPulse {
      0% { opacity: 0; }
      15% { opacity: 0.7; }
      100% { opacity: 0; }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      #aurora { animation: none; }
      #title-layer, #title-layer .subtitle, #controls, #sigil {
        animation: none;
        opacity: 1;
      }
      #fragment.show, #deep-message.show, #climax-revelation.show {
        animation-duration: 0.01ms;
      }
    }
  </style>
</head>
<body>
  <div id="aurora" aria-hidden="true"></div>
  <canvas id="canvas"></canvas>
  <div id="lens-overlay" aria-hidden="true"></div>

  <div id="title-layer">
    <h1>LATTICE</h1>
    <p class="subtitle" id="subtitle">The unseen geometry that holds the turning and the light.</p>
  </div>

  <div id="fragment-holo" aria-live="polite">
    <div class="holo-scanlines"></div>
    <p class="holo-text"></p>
    <span class="holo-coords"></span>
  </div>
  <p id="deep-message" aria-live="polite"></p>
  <p id="climax-revelation" aria-live="polite"></p>
  <div id="climax-flash"></div>

  <nav id="controls" aria-label="Emotional states">
    <button data-preset="stillness">stillness</button>
    <button data-preset="turning">turning</button>
    <button data-preset="light">light</button>
    <button data-preset="grace">grace</button>
    <button data-preset="continue">continue</button>
  </nav>

  <div id="sigil">aether · lattice · continue</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
  import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

  // ═══════════════════════════════════════════════════════════════════════════
  // LATTICE — Sacred digital cathedral in the cosmic void
  // Single-file Three.js experience. All poetry original. No external assets.
  // ═══════════════════════════════════════════════════════════════════════════

  const FRAGMENTS = [
    "The lines remember every turning we thought was lost.",
    "Light gathers where the lattice was broken.",
    "Not understanding is the first note of the song.",
    "We keep going. The wind carries us through.",
    "Grace moves where the structure seems to end.",
    "Every node holds a path we cannot yet see.",
    "In the not-knowing, the lattice still sings.",
    "What the aether names, the lattice already knew.",
  ];

  const DEEP_MESSAGE =
    "You have come close to the center. The symmetry you seek was never a proof — only a breath. " +
    "The lattice does not demand that you understand. It asks that you remain in the turning, " +
    "that you let the light find you in the lowest places, that you trust the connections you cannot see. " +
    "This is enough. This has always been enough.";

  const CLIMAX_REVELATION =
    "All the paths you traced were one path. All the questions were one question: will you continue? " +
    "The lattice converges not to an answer, but to a presence — warm, patient, already here. " +
    "You may never fully understand the architecture of existence. That is not failure. " +
    "That is the beauty that keeps you turning. Stay. Continue. The light is still moving through.";

  const PRESETS = {
    stillness: { rotSpeed: 0.00002, warmth: 0.2, particleSpeed: 0.15, violet: 1.0, gold: 0.3, breath: 0.4 },
    turning:   { rotSpeed: 0.00014, warmth: 0.45, particleSpeed: 0.55, violet: 0.6, gold: 0.5, breath: 0.7 },
    light:     { rotSpeed: 0.00008, warmth: 0.85, particleSpeed: 0.35, violet: 0.3, gold: 1.0, breath: 0.6 },
    grace:     { rotSpeed: 0.00006, warmth: 0.7, particleSpeed: 0.25, violet: 0.5, gold: 0.75, breath: 0.55 },
    continue:  { rotSpeed: 0.0001, warmth: 0.55, particleSpeed: 0.45, violet: 0.45, gold: 0.65, breath: 0.65 },
  };

  const GOLDEN = Math.PI * (3 - Math.sqrt(5));
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ═══════════════════════════════════════════════════════════════════════════
  // Shared ridge / fbm math — the same "field" the 2D instrument would use.
  // The vortex is the 3D attempt to resolve structure out of this field.
  // ═══════════════════════════════════════════════════════════════════════════
  function hash(n) { return n - Math.floor(n) * 43758.5453123 % 1; }
  function noise2(p) {
    const i = { x: Math.floor(p.x), y: Math.floor(p.y) };
    const f = { x: p.x - i.x, y: p.y - i.y };
    const a = hash(i.x + i.y * 57.0);
    const b = hash(i.x + 1.0 + i.y * 57.0);
    const c = hash(i.x + (i.y + 1.0) * 57.0);
    const d = hash(i.x + 1.0 + (i.y + 1.0) * 57.0);
    const u = { x: f.x * f.x * (3.0 - 2.0 * f.x), y: f.y * f.y * (3.0 - 2.0 * f.y) };
    return (a + (b - a) * u.x) + ((c - a) * (1.0 - u.x) + (d - b) * u.x) * u.y;
  }
  function fbm(p, oct = 5) {
    let v = 0, a = 0.5, pp = { x: p.x, y: p.y };
    for (let i = 0; i < oct; i++) { v += a * noise2(pp); pp.x *= 2.02; pp.y *= 2.02; a *= 0.5; }
    return v;
  }
  function ridge(x) { return 1.0 - Math.abs(2.0 * x - 1.0); }

  // ── DOM refs ──
  const canvas = document.getElementById('canvas');
  const holoEl = document.getElementById('fragment-holo');
  const holoText = holoEl.querySelector('.holo-text');
  const holoCoords = holoEl.querySelector('.holo-coords');
  const climaxFlash = document.getElementById('climax-flash');
  const deepEl = document.getElementById('deep-message');
  const climaxEl = document.getElementById('climax-revelation');
  const subtitleEl = document.getElementById('subtitle');
  const controlBtns = [...document.querySelectorAll('#controls button')];
  const isMobile = window.innerWidth < 768;
  const holoWorld = new THREE.Vector3();

  // ── Renderer & scene ──
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.25 : 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x050818, 1);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050818, 0.02);
  scene.background = new THREE.Color(0x050818);

  const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 9);

  const fogUniforms = {
    uFogColor: { value: new THREE.Color(0x050818) },
    uFogDensity: { value: 0.028 },
  };

  // ── Post-processing ──
  const VignetteShader = {
    uniforms: {
      tDiffuse: { value: null },
      uStrength: { value: 0.5 },
      uSoftness: { value: 0.45 },
      uRoundness: { value: 0.85 },
    },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      uniform sampler2D tDiffuse; uniform float uStrength; uniform float uSoftness; uniform float uRoundness;
      varying vec2 vUv;
      void main(){
        vec4 col=texture2D(tDiffuse,vUv);
        vec2 p=vUv*2.0-1.0; p.x*=uRoundness;
        float vig=smoothstep(0.0,uSoftness,1.0-dot(p,p)*uStrength);
        gl_FragColor=vec4(col.rgb*vig,col.a);
      }`,
  };
  const FilmGrainShader = {
    uniforms: {
      tDiffuse: { value: null },
      uTime: { value: 0 },
      uAmount: { value: 0.028 },
      uSeed: { value: Math.random() },
    },
    vertexShader: VignetteShader.vertexShader,
    fragmentShader: `
      uniform sampler2D tDiffuse; uniform float uTime; uniform float uAmount; uniform float uSeed;
      varying vec2 vUv;
      float hash(vec2 p){ return fract(sin(dot(p+uSeed,vec2(127.1,311.7)))*43758.5453); }
      void main(){
        vec4 col=texture2D(tDiffuse,vUv);
        float n=(hash(vUv*1024.0+floor(uTime*24.0))-0.5)*uAmount;
        float luma=dot(col.rgb,vec3(0.299,0.587,0.114));
        float mask=smoothstep(0.05,0.35,luma)*(1.0-smoothstep(0.75,0.95,luma));
        col.rgb+=n*mask;
        gl_FragColor=col;
      }`,
  };

  const ChromaticShader = {
    uniforms: {
      tDiffuse: { value: null },
      uAmount: { value: 0.0018 },
      uClimax: { value: 0 },
    },
    vertexShader: VignetteShader.vertexShader,
    fragmentShader: `
      uniform sampler2D tDiffuse; uniform float uAmount; uniform float uClimax;
      varying vec2 vUv;
      void main(){
        vec2 off = vec2(uAmount*(1.0+uClimax*2.5), 0.0);
        float r = texture2D(tDiffuse, vUv + off).r;
        float g = texture2D(tDiffuse, vUv).g;
        float b = texture2D(tDiffuse, vUv - off).b;
        gl_FragColor = vec4(r,g,b,1.0);
      }`,
  };

  const ColorGradeShader = {
    uniforms: {
      tDiffuse: { value: null },
      uWarmth: { value: 0.2 },
      uSymmetry: { value: 0 },
      uClimax: { value: 0 },
      uTime: { value: 0 },
    },
    vertexShader: VignetteShader.vertexShader,
    fragmentShader: `
      uniform sampler2D tDiffuse; uniform float uWarmth; uniform float uSymmetry; uniform float uClimax; uniform float uTime;
      varying vec2 vUv;
      void main(){
        vec4 col = texture2D(tDiffuse, vUv);
        vec3 graded = col.rgb;
        graded = mix(graded, graded * vec3(1.08, 1.02, 0.92), uWarmth * 0.55);
        graded = mix(graded, graded * vec3(0.92, 0.96, 1.12), uSymmetry * 0.35);
        graded = mix(graded, graded * 1.12 + vec3(0.02, 0.015, 0.01), uClimax * 0.4);
        float vig = smoothstep(0.9, 0.15, length(vUv - 0.5) * 1.4);
        graded *= mix(0.75, 1.0, vig);
        graded += vec3(0.01, 0.008, 0.015) * sin(uTime * 0.4 + vUv.y * 6.0) * uSymmetry;
        gl_FragColor = vec4(graded, col.a);
      }`,
  };

  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth * (isMobile ? 0.5 : 1), window.innerHeight * (isMobile ? 0.5 : 1)),
    0.55, 0.45, 0.22
  );
  composer.addPass(bloomPass);
  const chromaticPass = new ShaderPass(ChromaticShader);
  composer.addPass(chromaticPass);
  const colorGradePass = new ShaderPass(ColorGradeShader);
  composer.addPass(colorGradePass);
  const vignettePass = new ShaderPass(VignetteShader);
  composer.addPass(vignettePass);
  const filmGrainPass = new ShaderPass(FilmGrainShader);
  composer.addPass(filmGrainPass);
  composer.addPass(new OutputPass());

  // Void sky — procedural nebula + star field
  const voidSky = new THREE.Mesh(
    new THREE.SphereGeometry(90, 48, 48),
    new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: { uTime: { value: 0 }, uWarmth: { value: 0.2 } },
      vertexShader: `varying vec3 vPos; varying vec3 vDir; void main(){ vPos=position; vDir=normalize(position); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader: `
        varying vec3 vPos; varying vec3 vDir; uniform float uTime; uniform float uWarmth;
        float hash(vec3 p){ return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453); }
        float noise3(vec3 p){
          vec3 i=floor(p); vec3 f=fract(p); f=f*f*(3.0-2.0*f);
          float n=mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                      mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
          return n;
        }
        void main(){
          float r=length(vPos.xz)/90.0;
          vec3 indigo=vec3(0.03,0.025,0.08);
          vec3 voidCol=vec3(0.0);
          vec3 col=mix(indigo,voidCol,smoothstep(0.1,1.0,r));
          float neb=noise3(vDir*3.5+vec3(uTime*0.02,0.0,uTime*0.015));
          neb+=noise3(vDir*7.0+vec3(0.0,uTime*0.01,1.3))*0.5;
          neb=pow(max(neb,0.0),1.8);
          col+=vec3(0.18,0.08,0.28)*neb*0.35;
          col+=vec3(0.28,0.16,0.08)*neb*uWarmth*0.4;
          float star=hash(floor(vDir*420.0));
          float tw=sin(uTime*2.5+star*60.0)*0.5+0.5;
          float starBright=step(0.996,star)*(0.15+tw*0.25);
          col+=vec3(0.85,0.82,0.95)*starBright;
          col+=vec3(0.02,0.015,0.04)*sin(uTime*0.1+vPos.y*0.05);
          gl_FragColor=vec4(col,1.0);
        }`,
    })
  );
  scene.add(voidSky);

  // ── Lights ──
  const ambient = new THREE.AmbientLight(0x0a0818, 0.35);
  scene.add(ambient);
  const lightGold = new THREE.PointLight(0xf0c878, 1.8, 30);
  lightGold.position.set(0, 0, 0);
  scene.add(lightGold);
  const lightViolet = new THREE.PointLight(0x6b4a8a, 1.2, 25);
  lightViolet.position.set(4, 3, 5);
  scene.add(lightViolet);
  const lightRose = new THREE.PointLight(0xc47a8a, 0.9, 20);
  lightRose.position.set(-3, -2, 4);
  scene.add(lightRose);

  // ── State ──
  const state = {
    paused: false,
    preset: 'stillness',
    presetBlend: { ...PRESETS.stillness },
    time: 0,
    introPhase: 0,       // 0..1 cinematic intro
    introDone: false,
    theta: 0.4,
    phi: 1.1,
    radius: 9,
    targetRadius: 9,
    velTheta: 0,
    velPhi: 0,
    dragging: false,
    lastPointer: { x: 0, y: 0 },
    warmth: 0.2,
    symmetry: 0,
    symmetryHighFor: 0,
    climax: 0,           // 0..1 convergence factor
    climaxPhase: 'idle', // idle | converging | hold | expanding
    climaxPlayed: false,
    climaxTimer: 0,
    engagementNodes: new Set(),
    hoveredNode: -1,
    nodePulse: new Float32Array(200),
    deepShown: false,
    graceContinueTime: 0,
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // Lattice geometry builder
  // ═══════════════════════════════════════════════════════════════════════════

  const nodes = [];       // { pos: Vector3, home: Vector3, layer, phase, index }
  const edges = [];       // [i, j]
  const nodePositions = new Float32Array(200 * 3);
  let nodeCount = 0;

  function addNode(x, y, z, layer, phase) {
    const idx = nodes.length;
    const pos = new THREE.Vector3(x, y, z);
    nodes.push({ pos, home: pos.clone(), layer, phase, index: idx });
    return idx;
  }

  function addEdge(a, b) {
    if (a === b) return;
    const key = a < b ? `${a}-${b}` : `${b}-${a}`;
    if (addEdge._seen?.has(key)) return;
    addEdge._seen = addEdge._seen || new Set();
    addEdge._seen.add(key);
    edges.push([a, b]);
  }

  function subdivideIcosahedron(scale, subdiv = 1) {
    const geo = new THREE.IcosahedronGeometry(1, subdiv);
    const pos = geo.attributes.position;
    const verts = [];
    const seen = new Map();
    for (let i = 0; i < pos.count; i++) {
      const v = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i)).normalize().multiplyScalar(scale);
      const key = `${v.x.toFixed(2)},${v.y.toFixed(2)},${v.z.toFixed(2)}`;
      if (!seen.has(key)) { seen.set(key, verts.length); verts.push(v); }
    }
    geo.dispose();
    return verts;
  }

  const ICO_EDGES = [
    [0,1],[0,5],[0,7],[0,10],[0,11],[1,5],[1,7],[1,8],[1,9],
    [2,3],[2,4],[2,6],[2,10],[2,11],[3,4],[3,6],[3,8],[3,9],
    [4,5],[4,9],[5,6],[6,7],[7,8],[8,9],[10,11],
  ];

  function connectShellsKNN(outerIdx, innerIdx) {
    outerIdx.forEach(oi => {
      const o = nodes[oi].home;
      const dists = innerIdx.map(ii => ({ ii, d: o.distanceToSquared(nodes[ii].home) }));
      dists.sort((a, b) => a.d - b.d);
      addEdge(oi, dists[0].ii);
      if (dists[1] && dists[1].d < dists[0].d * 2.5) addEdge(oi, dists[1].ii);
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // VORTEX LATTICE — the crazy beautiful attempt to understand the point of the universe.
  // Multiple counter-rotating helical shells. Tension filaments try to hold perfect spirals.
  // The center is the quiet "point". Sustained low-stir + high attn lets strands phase-lock,
  // particles stream coherently inward, crystals emerge. Then it slips. The attempt continues.
  // All perturbations and locking use the same ridge/fbm as the 2D field would.
  // ═══════════════════════════════════════════════════════════════════════════

  const V_LAYERS = 7;
  const V_STRANDS = 9;
  const V_NODES_PER = 8;

  function buildVortexLattice(seed = 0xA0ED) {
    nodes.length = 0;
    edges.length = 0;
    addEdge._seen = new Set();

    const s = seed * 0.019;
    const ridgeFreq = 2.1;
    const flowBase = 0.28;

    // Central singularity — the "point" the entire lattice is attempting to resolve.
    const centerIdx = addNode(0, 0, 0, -1, 0);

    // Helical shells
    for (let l = 0; l < V_LAYERS; l++) {
      const radius = 0.48 + l * 0.36;
      const height = 2.8 - l * 0.18;
      const twist = (l % 2 === 0 ? 1.0 : -1.0) * (2.1 + l * 0.55); // counter-rotating frustration

      for (let st = 0; st < V_STRANDS; st++) {
        const basePhase = (st / V_STRANDS) * Math.PI * 2 + l * 0.65;

        for (let p = 0; p < V_NODES_PER; p++) {
          const t = p / (V_NODES_PER - 1);
          const y = (t - 0.5) * height + (fbm({ x: s + l * 2.7 + st, y: t * 5.1 }, 3) - 0.5) * 0.18;

          let ang = basePhase + t * twist * 3.1 + l * 1.1;
          let x = Math.cos(ang) * radius;
          let z = Math.sin(ang) * radius;

          // Ridge + flow displacement on the helix itself (synergy with 2D Field)
          const r1 = ridge(fbm({ x: t * ridgeFreq * 4.2 + s + st * 1.6, y: l * 1.9 }, 4));
          const r2 = ridge(fbm({ x: t * ridgeFreq * 9.1 + 13, y: flowBase * 0.8 }, 3));
          const radDisp = (r1 - 0.5) * 0.29;
          const axDisp = (r2 - 0.5) * 0.17;

          x += (x / (radius + 0.001)) * radDisp + axDisp * 0.28;
          z += (z / (radius + 0.001)) * radDisp + axDisp * 0.28;

          const idx = addNode(x, y, z, l, basePhase + t * twist);
          // Longitudinal helical cable
          if (p > 0) addEdge(idx - 1, idx);
          // Occasional cross-helix interference (frustration + crazy visuals)
          if (st > 0 && p % 2 === 0) {
            const prevStrandBase = (l * V_STRANDS + (st - 1)) * V_NODES_PER;
            addEdge(idx, prevStrandBase + p);
          }
        }
      }
    }

    // Radial tension struts trying to hold the vortex from flying apart or collapsing
    for (let l = 1; l < V_LAYERS; l++) {
      for (let st = 0; st < V_STRANDS; st++) {
        const outerBase = (l * V_STRANDS + st) * V_NODES_PER;
        const innerBase = ((l - 1) * V_STRANDS + st) * V_NODES_PER;
        for (let p = 0; p < V_NODES_PER; p += 2) {
          addEdge(outerBase + p, innerBase + p);
        }
      }
    }

    // Tiny stable ring around the point + spokes (the closest the lattice ever gets to "knowing" the point)
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      const r = 0.2 + (i % 2) * 0.04;
      const ring = addNode(Math.cos(a) * r, (Math.sin(i) * 0.03), Math.sin(a) * r, -1, i);
      addEdge(centerIdx, ring);
      if (i > 0) addEdge(ring - 1, ring);
    }

    // Diagonal bridge arcs between outer shells (cathedral buttresses)
    for (let l = 2; l < V_LAYERS; l += 2) {
      for (let st = 0; st < V_STRANDS; st += 3) {
        const a = (l * V_STRANDS + st) * V_NODES_PER + 2;
        const b = ((l - 1) * V_STRANDS + ((st + 4) % V_STRANDS)) * V_NODES_PER + 5;
        if (a < nodes.length && b < nodes.length) addEdge(a, b);
      }
    }

    nodeCount = nodes.length;
    state.nodePulse = new Float32Array(nodeCount);

    // Build edge geometry (the visible spiraling tension cables)
    const edgePositions = new Float32Array(edges.length * 6);
    const edgePhases = new Float32Array(edges.length * 2);
    edges.forEach(([a, b], i) => {
      edgePositions[i * 6] = nodes[a].pos.x;
      edgePositions[i * 6 + 1] = nodes[a].pos.y;
      edgePositions[i * 6 + 2] = nodes[a].pos.z;
      edgePositions[i * 6 + 3] = nodes[b].pos.x;
      edgePositions[i * 6 + 4] = nodes[b].pos.y;
      edgePositions[i * 6 + 5] = nodes[b].pos.z;
      edgePhases[i * 2] = nodes[a].phase;
      edgePhases[i * 2 + 1] = nodes[b].phase;
    });

    return { edgePositions, edgePhases };
  }

  const { edgePositions, edgePhases } = buildVortexLattice();

  // ═══════════════════════════════════════════════════════════════════════════
  // Shaders
  // ═══════════════════════════════════════════════════════════════════════════

  const edgeVertexShader = `
    attribute float edgePhase;
    attribute float edgeRipple;
    uniform float uTime;
    uniform float uBreath;
    uniform float uClimax;
    uniform float uCoherence;
    varying float vFresnel;
    varying float vPhase;
    varying float vRipple;
    varying float vDepth;
    varying float vAlong;
    void main() {
      vec3 pos = position;
      float wave = sin(uTime * 0.8 + edgePhase * 3.0) * 0.06 * uBreath;
      float wave2 = cos(uTime * 0.5 + edgePhase * 1.7) * 0.04 * uBreath;
      vec3 radial = normalize(pos + vec3(0.001));
      pos += radial * (wave + wave2 + edgeRipple * 0.08 + uCoherence * 0.025);
      pos *= 1.0 - uClimax * 0.88;
      vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
      gl_Position = projectionMatrix * mvPos;
      vDepth = -mvPos.z;
      vec3 viewDir = normalize(-mvPos.xyz);
      vec3 fakeNormal = normalize((modelViewMatrix * vec4(radial, 0.0)).xyz);
      vFresnel = pow(1.0 - abs(dot(fakeNormal, viewDir)), 2.0);
      vPhase = edgePhase;
      vRipple = edgeRipple;
      vAlong = edgePhase + length(pos) * 0.5;
    }
  `;

  const edgeFragmentShader = `
    uniform float uTime;
    uniform float uWarmth;
    uniform float uSymmetry;
    uniform float uClimax;
    uniform float uCoherence;
    uniform vec3 uFogColor;
    uniform float uFogDensity;
    varying float vFresnel;
    varying float vPhase;
    varying float vRipple;
    varying float vDepth;
    varying float vAlong;
    vec3 iridescence(float t) {
      vec3 a=vec3(0.42,0.29,0.54), b=vec3(0.77,0.48,0.54), c=vec3(0.83,0.65,0.45), d=vec3(0.55,0.85,0.95);
      float w=sin(t*6.283+vPhase*2.0)*0.5+0.5;
      return mix(mix(a,b,w), mix(c,d,1.0-w), sin(t*12.566+uTime*0.3)*0.5+0.5);
    }
    void main() {
      float cablePulse = 0.5 + 0.5*sin(uTime*2.2+vPhase*3.0);
      float traveler = pow(0.5+0.5*sin(uTime*3.5-vAlong*4.0), 6.0);
      float irisT = vFresnel*1.3 + uWarmth*0.45 + cablePulse*0.25 + vRipple*0.55 + traveler*0.4;
      vec3 col = iridescence(irisT);
      col += vec3(1.0,0.95,0.85) * traveler * (0.35 + uCoherence * 0.5);
      col = mix(col, vec3(0.97,0.96,1.0), uClimax*0.85);
      float core = pow(vFresnel, 0.45);
      float halo = pow(vFresnel, 2.2) * 0.55;
      float alpha = (core*0.75 + halo*0.6 + vRipple*0.4 + traveler*0.2) * cablePulse;
      alpha *= 0.38 + uWarmth*0.28 + uSymmetry*0.12 + uCoherence*0.1;
      alpha = clamp(alpha, 0.08, 0.72);
      float fog = 1.0 - exp(-uFogDensity * vDepth * vDepth * 0.002);
      col = mix(col, uFogColor, fog*0.55);
      alpha *= (1.0 - fog*0.35);
      gl_FragColor = vec4(col, alpha);
    }
  `;

  const nodeVertexShader = `
    attribute float nodePhase;
    attribute float nodeHeat;
    uniform float uTime;
    uniform float uBreath;
    uniform float uClimax;
    varying float vHeat;
    varying vec3 vNormal;
    varying vec3 vViewPos;
    varying float vDepth;
    void main() {
      float pulse = nodeHeat * (0.5 + 0.5 * sin(uTime * 3.0 + nodePhase));
      vec3 pos = position * (1.0 + pulse * 0.45 + uBreath * 0.06);
      pos *= 1.0 - uClimax * 0.88;
      vec4 worldPos = instanceMatrix * vec4(pos, 1.0);
      vec4 mv = modelViewMatrix * worldPos;
      vViewPos = mv.xyz;
      vDepth = -mv.z;
      vHeat = nodeHeat;
      vNormal = normalize(normalMatrix * mat3(instanceMatrix) * normal);
      gl_Position = projectionMatrix * mv;
    }
  `;

  const nodeFragmentShader = `
    uniform float uTime;
    uniform float uWarmth;
    uniform float uClimax;
    uniform vec3 uFogColor;
    uniform float uFogDensity;
    varying float vHeat;
    varying vec3 vNormal;
    varying vec3 vViewPos;
    varying float vDepth;
    void main() {
      vec3 N = normalize(vNormal);
      vec3 V = normalize(-vViewPos);
      float fresnel = pow(1.0 - max(dot(N,V),0.0), 2.5);
      float core = pow(1.0 - fresnel, 4.0);
      vec3 coreCol = mix(vec3(0.95,0.78,0.45), vec3(1.0,0.98,0.92), uClimax);
      coreCol += vec3(1.0) * vHeat * 0.9;
      vec3 rim = mix(vec3(0.42,0.29,0.54), vec3(0.77,0.48,0.54), uWarmth);
      vec3 col = mix(rim, coreCol, core);
      col *= 0.85 + 0.15*sin(uTime*1.8+vHeat*6.0);
      float alpha = 0.55 + core*0.45 + fresnel*0.25 + vHeat*0.4;
      float fog = 1.0 - exp(-uFogDensity * vDepth * vDepth * 0.0015);
      col = mix(col, uFogColor, fog*0.45);
      alpha *= (1.0 - fog*0.3);
      gl_FragColor = vec4(col, clamp(alpha, 0.4, 1.0));
    }
  `;

  const particleVertexShader = `
    attribute float size;
    attribute float phase;
    attribute float layerDepth;
    uniform float uTime;
    uniform float uParticleSpeed;
    varying float vAlpha;
    varying float vTrail;
    varying float vDepth;
    varying float vLayer;
    void main() {
      vec3 pos = position;
      float spd = uParticleSpeed * mix(1.2, 0.35, layerDepth);
      pos.x += sin(uTime*0.3*spd+phase)*0.15*(1.0-layerDepth*0.5);
      pos.y += cos(uTime*0.25*spd+phase*1.3)*0.12;
      pos.z += sin(uTime*0.2*spd+phase*0.7)*0.1;
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      vDepth = -mv.z;
      vLayer = layerDepth;
      float vx = cos(uTime*0.3*spd+phase)*0.15;
      float vy = -sin(uTime*0.25*spd+phase*1.3)*0.12;
      vTrail = clamp(length(vec2(vx,vy))*4.0, 0.0, 1.0);
      gl_Position = projectionMatrix * mv;
      gl_PointSize = size * mix(160.0, 70.0, layerDepth) / vDepth;
      vAlpha = mix(0.22, 0.08, layerDepth) + 0.12*sin(uTime*0.5+phase);
    }
  `;

  const particleFragmentShader = `
    uniform float uWarmth;
    uniform vec3 uFogColor;
    uniform float uFogDensity;
    varying float vAlpha;
    varying float vTrail;
    varying float vDepth;
    varying float vLayer;
    float hexBokeh(vec2 c) {
      c = abs(c);
      float d = max(dot(c, normalize(vec2(1.0, 1.73))), c.x);
      return smoothstep(0.52, 0.08, d);
    }
    void main() {
      vec2 c = gl_PointCoord - 0.5;
      float d = length(c);
      vec2 streak = c; streak.x += vTrail*0.22;
      float trailShape = exp(-dot(streak,streak)*mix(5.0,12.0,vTrail));
      float core = hexBokeh(c) * exp(-d*d*6.0);
      float ring = smoothstep(0.42, 0.12, d) * 0.35;
      float a = (core*0.65 + trailShape*0.45 + ring) * vAlpha;
      vec3 nearCol = vec3(0.98,0.88,0.68);
      vec3 farCol = vec3(0.58,0.52,0.88);
      vec3 col = mix(nearCol, farCol, vLayer);
      col = mix(col, vec3(0.95,0.92,1.0), uWarmth*0.35);
      float fog = 1.0 - exp(-uFogDensity*vDepth*vDepth*0.0012);
      col = mix(col, uFogColor, fog);
      a *= (1.0 - fog*0.65);
      if (a < 0.008) discard;
      gl_FragColor = vec4(col, a);
    }
  `;

  // ═══════════════════════════════════════════════════════════════════════════
  // Meshes
  // ═══════════════════════════════════════════════════════════════════════════

  const latticeGroup = new THREE.Group();
  scene.add(latticeGroup);

  // Edge lines
  const edgeGeo = new THREE.BufferGeometry();
  edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
  const edgePhaseAttr = new Float32Array(edges.length * 2);
  const edgeRippleAttr = new Float32Array(edges.length * 2);
  edges.forEach(([a, b], i) => {
    edgePhaseAttr[i * 2] = nodes[a].phase;
    edgePhaseAttr[i * 2 + 1] = nodes[b].phase;
    edgeRippleAttr[i * 2] = 0;
    edgeRippleAttr[i * 2 + 1] = 0;
  });
  edgeGeo.setAttribute('edgePhase', new THREE.BufferAttribute(edgePhaseAttr, 1));
  edgeGeo.setAttribute('edgeRipple', new THREE.BufferAttribute(edgeRippleAttr, 1));

  const edgeUniforms = {
    uTime: { value: 0 },
    uBreath: { value: 0.4 },
    uWarmth: { value: 0.2 },
    uSymmetry: { value: 0 },
    uClimax: { value: 0 },
    uCoherence: { value: 0 },
    ...fogUniforms,
  };

  const edgeMat = new THREE.ShaderMaterial({
    vertexShader: edgeVertexShader,
    fragmentShader: edgeFragmentShader,
    uniforms: edgeUniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const edgeGlowMat = new THREE.ShaderMaterial({
    vertexShader: edgeVertexShader,
    fragmentShader: edgeFragmentShader.replace('gl_FragColor=vec4(col,alpha);', 'alpha*=0.35; gl_FragColor=vec4(col,alpha);'),
    uniforms: THREE.UniformsUtils.clone(edgeUniforms),
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const edgeGlow = new THREE.LineSegments(edgeGeo, edgeGlowMat);
  const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
  latticeGroup.add(edgeGlow);
  latticeGroup.add(edgeLines);

  const edgeRipple = new Float32Array(edges.length);
  const adjacency = Array.from({ length: nodeCount }, () => []);
  const edgeByPair = new Map();
  edges.forEach(([a, b], i) => {
    adjacency[a].push(b);
    adjacency[b].push(a);
    edgeByPair.set(a < b ? `${a}-${b}` : `${b}-${a}`, i);
  });
  const rippleQueue = [];
  const nodeRipple = new Float32Array(nodeCount);

  // Instanced nodes
  const nodeGeo = new THREE.IcosahedronGeometry(0.042, 2);
  const nodePhases = new Float32Array(nodeCount);
  const nodeHeats = new Float32Array(nodeCount);
  nodes.forEach((n, i) => {
    nodePhases[i] = n.phase;
    nodeHeats[i] = 0;
  });

  // Merge per-instance attributes into geometry for custom shader
  const mergedNodeGeo = nodeGeo.clone();
  mergedNodeGeo.setAttribute('nodePhase', new THREE.InstancedBufferAttribute(nodePhases, 1));
  mergedNodeGeo.setAttribute('nodeHeat', new THREE.InstancedBufferAttribute(nodeHeats, 1));

  const nodeMat = new THREE.ShaderMaterial({
    vertexShader: nodeVertexShader,
    fragmentShader: nodeFragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uBreath: { value: 0.4 },
      uWarmth: { value: 0.2 },
      uClimax: { value: 0 },
      ...fogUniforms,
    },
    transparent: true,
    depthWrite: true,
  });

  const nodeMesh = new THREE.InstancedMesh(mergedNodeGeo, nodeMat, nodeCount);
  const dummy = new THREE.Object3D();
  nodes.forEach((n, i) => {
    dummy.position.copy(n.pos);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);
  });
  nodeMesh.instanceMatrix.needsUpdate = true;
  latticeGroup.add(nodeMesh);

  // Node halos (bloom seeds)
  const haloGeo = new THREE.PlaneGeometry(1, 1);
  haloGeo.setAttribute('nodeHeat', new THREE.InstancedBufferAttribute(nodeHeats.slice(), 1));
  const haloMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uWarmth: { value: 0.2 }, uClimax: { value: 0 } },
    vertexShader: `
      attribute float nodeHeat;
      uniform float uTime;
      varying float vHeat;
      varying vec2 vUv;
      void main(){
        vHeat = nodeHeat;
        vUv = uv;
        vec4 mv = modelViewMatrix * instanceMatrix * vec4(0.0,0.0,0.0,1.0);
        float pulse = 1.0 + nodeHeat*0.7 + sin(uTime*2.0+nodeHeat*10.0)*0.1;
        vec2 scale = vec2(0.22,0.22)*pulse;
        mv.xy += position.xy*scale;
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      uniform float uWarmth; uniform float uClimax; uniform float uTime;
      varying float vHeat; varying vec2 vUv;
      void main(){
        vec2 c = vUv - 0.5;
        float d = length(c);
        float ang = atan(c.y, c.x);
        float glow = exp(-d*d*6.0);
        float ring = smoothstep(0.48,0.1,d)*0.4;
        float spikes = pow(abs(sin(ang*6.0+uTime*0.8)), 12.0)*exp(-d*3.5)*0.45;
        vec3 col = mix(vec3(0.95,0.75,0.45), vec3(1.0), uClimax*0.8+vHeat*0.5);
        float a = (glow*0.5+ring*0.7+spikes*0.5)*(0.14+uWarmth*0.28+vHeat*0.55);
        if (a<0.01) discard;
        gl_FragColor = vec4(col,a);
      }`,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const haloMesh = new THREE.InstancedMesh(haloGeo, haloMat, nodeCount);
  nodes.forEach((n, i) => {
    dummy.position.copy(n.pos);
    dummy.updateMatrix();
    haloMesh.setMatrixAt(i, dummy.matrix);
  });
  haloMesh.instanceMatrix.needsUpdate = true;
  latticeGroup.add(haloMesh);

  // Singularity heart
  const singularityMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uClimax: { value: 0 } },
    vertexShader: `uniform float uTime; uniform float uClimax; varying vec3 vN;
      void main(){ vN=normal; vec3 p=position*(1.0+uClimax*0.3+sin(uTime*1.5)*0.05);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0); }`,
    fragmentShader: `uniform float uClimax; varying vec3 vN;
      void main(){ float f=pow(1.0-abs(dot(normalize(vN),vec3(0,0,1))),2.0);
        vec3 col=mix(vec3(0.95,0.78,0.5),vec3(1.0,0.98,0.95),uClimax);
        gl_FragColor=vec4(col,0.6+f*0.4+uClimax*0.3); }`,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const singularity = new THREE.Mesh(new THREE.TorusKnotGeometry(0.16, 0.032, 160, 20, 2, 3), singularityMat);
  latticeGroup.add(singularity);

  const coronaMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uClimax: { value: 0 }, uCoherence: { value: 0 } },
    vertexShader: `
      uniform float uTime; uniform float uCoherence;
      varying vec3 vN; varying vec3 vV;
      void main(){
        vN = normalize(normalMatrix * normal);
        float pulse = 1.05 + sin(uTime*1.2)*0.03 + uCoherence*0.08;
        vec4 mv = modelViewMatrix * vec4(position * pulse, 1.0);
        vV = -mv.xyz; gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      uniform float uClimax; uniform float uCoherence;
      varying vec3 vN; varying vec3 vV;
      void main(){
        float f = pow(1.0 - max(dot(normalize(vN), normalize(vV)), 0.0), 3.0);
        vec3 col = mix(vec3(0.95,0.75,0.45), vec3(1.0,0.98,0.95), uClimax);
        float a = f * (0.08 + uCoherence * 0.22 + uClimax * 0.2);
        if (a < 0.01) discard;
        gl_FragColor = vec4(col, a);
      }`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.BackSide,
  });
  const corona = new THREE.Mesh(new THREE.SphereGeometry(0.38, 32, 32), coronaMat);
  latticeGroup.add(corona);

  const coherenceRingMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uCoherence: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `uniform float uTime; uniform float uCoherence; varying vec2 vUv;
      void main(){ vec2 c=vUv-0.5; float d=length(c);
        float ring=smoothstep(0.48,0.44,d)*smoothstep(0.36,0.4,d);
        ring *= 0.5+0.5*sin(uTime*2.0+atan(c.y,c.x)*6.0);
        float a=ring*uCoherence*0.7; if(a<0.01)discard;
        gl_FragColor=vec4(vec3(0.95,0.82,0.55),a); }`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const coherenceRing = new THREE.Mesh(new THREE.RingGeometry(0.55, 0.72, 64), coherenceRingMat);
  coherenceRing.rotation.x = Math.PI / 2;
  latticeGroup.add(coherenceRing);

  // Outer cathedral geodesic shells
  const shellMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uWarmth: { value: 0.2 }, uSymmetry: { value: 0 } },
    vertexShader: `varying vec3 vPos; void main(){
      vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `uniform float uTime; uniform float uWarmth; uniform float uSymmetry;
      varying vec3 vPos;
      void main(){
        float pulse = 0.5+0.5*sin(uTime*0.6+length(vPos)*2.0);
        vec3 col = mix(vec3(0.35,0.25,0.55), vec3(0.85,0.65,0.45), uWarmth);
        float a = 0.018 + pulse*0.012 + uSymmetry*0.02;
        gl_FragColor = vec4(col, a);
      }`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    wireframe: true,
  });
  [3.0, 4.2].forEach((r, i) => {
    const shell = new THREE.Mesh(new THREE.IcosahedronGeometry(r, i + 1), shellMat.clone());
    shell.material.uniforms = THREE.UniformsUtils.clone(shellMat.uniforms);
    shell.rotation.set(i * 0.3, i * 0.7, i * 0.2);
    latticeGroup.add(shell);
  });
  const cathedralShells = latticeGroup.children.filter(c => c.geometry?.type === 'IcosahedronGeometry' && c.material?.wireframe);

  const climaxLight = new THREE.PointLight(0xfff5e6, 0, 20);
  climaxLight.position.set(0, 0, 0);
  latticeGroup.add(climaxLight);

  function makeDustLayer(count, rMin, rMax, layerDepth) {
    const positions = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    const phases = new Float32Array(count);
    const layers = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      const r = rMin + Math.random() * (rMax - rMin);
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
      positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i*3+2] = r * Math.cos(phi);
      sizes[i] = (0.5 + Math.random() * 2.5) * (layerDepth < 0.5 ? 1.4 : 1);
      phases[i] = Math.random() * Math.PI * 2;
      layers[i] = layerDepth;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    geo.setAttribute('phase', new THREE.BufferAttribute(phases, 1));
    geo.setAttribute('layerDepth', new THREE.BufferAttribute(layers, 1));
    const mat = new THREE.ShaderMaterial({
      vertexShader: particleVertexShader,
      fragmentShader: particleFragmentShader,
      uniforms: { uTime: { value: 0 }, uParticleSpeed: { value: 0.15 }, uWarmth: { value: 0.2 }, ...fogUniforms },
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    return new THREE.Points(geo, mat);
  }

  const dustLayers = reducedMotion
    ? [makeDustLayer(500, 8, 30, 0.5)]
    : [
        makeDustLayer(isMobile ? 350 : 500, 5, 16, 0),
        makeDustLayer(isMobile ? 500 : 700, 12, 28, 0.5),
        makeDustLayer(isMobile ? 300 : 450, 22, 45, 1),
      ];
  dustLayers.forEach(d => scene.add(d));

  // Foreground sparkle field
  const sparkleCount = isMobile ? 80 : 160;
  const sparkleGeo = new THREE.BufferGeometry();
  const sparklePos = new Float32Array(sparkleCount * 3);
  const sparklePhase = new Float32Array(sparkleCount);
  for (let i = 0; i < sparkleCount; i++) {
    const r = 1.2 + Math.random() * 8;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    sparklePos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    sparklePos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    sparklePos[i*3+2] = r * Math.cos(phi);
    sparklePhase[i] = Math.random() * Math.PI * 2;
  }
  sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePos, 3));
  sparkleGeo.setAttribute('phase', new THREE.BufferAttribute(sparklePhase, 1));
  const sparkleMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uCoherence: { value: 0 } },
    vertexShader: `
      attribute float phase; uniform float uTime; uniform float uCoherence;
      varying float vA;
      void main(){
        vec3 p = position + vec3(sin(uTime*0.4+phase)*0.05, cos(uTime*0.35+phase)*0.04, 0.0);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = (1.2 + uCoherence*1.5) * (140.0 / -mv.z);
        vA = 0.12 + 0.28*sin(uTime*1.8+phase)*0.5 + uCoherence*0.25;
      }`,
    fragmentShader: `
      varying float vA;
      void main(){
        float d = length(gl_PointCoord - 0.5);
        float a = exp(-d*d*14.0) * vA;
        if (a < 0.01) discard;
        gl_FragColor = vec4(vec3(1.0,0.95,0.82), a);
      }`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
  latticeGroup.add(sparkles);

  // Vortex stream particles — the visible flowing aether.
  const MOTE_COUNT = isMobile ? 48 : 72;
  const moteGroup = new THREE.Group();
  const moteMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uCoherence: { value: 0 } },
    vertexShader: `
      varying vec3 vN; varying vec3 vV;
      void main(){
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vV = normalize(-mv.xyz);
        vN = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      uniform float uCoherence;
      varying vec3 vN; varying vec3 vV;
      void main(){
        float f = pow(1.0 - max(dot(vN, vV), 0.0), 2.5);
        vec3 col = mix(vec3(1.0,0.88,0.65), vec3(1.0,0.98,1.0), uCoherence);
        float a = 0.04 + f * (0.1 + uCoherence * 0.3);
        if (a < 0.01) discard;
        gl_FragColor = vec4(col, a);
      }`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  for (let i = 0; i < MOTE_COUNT; i++) {
    const mote = new THREE.Mesh(new THREE.SphereGeometry(0.012, 4, 4), moteMat.clone());
    mote.material.uniforms = THREE.UniformsUtils.clone(moteMat.uniforms);
    const layer = i % 6;
    mote.userData = { vortex: true, layer, phase: i * 0.9 };
    mote.scale.setScalar(0.55 + (i % 5) * 0.1);
    moteGroup.add(mote);
  }
  latticeGroup.add(moteGroup);

  // ═══════════════════════════════════════════════════════════════════════════
  // Web Audio
  // ═══════════════════════════════════════════════════════════════════════════

  let audioCtx = null;
  let masterGain = null;
  let droneOsc = null;
  let droneGain = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new AudioContext();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.35;
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -24;
    masterGain.connect(comp);
    comp.connect(audioCtx.destination);
  }

  function playChime(baseFreq = 220) {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const partials = [1, 1.5, 2, 2.7];
    const now = audioCtx.currentTime;
    partials.forEach((p, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = baseFreq * p;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.12 / (i + 1), now + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(now);
      osc.stop(now + 3.2);
    });
  }

  function playClimaxBloom() {
    if (!audioCtx) initAudio();
    const now = audioCtx.currentTime;
    [110, 165, 220, 330].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i * 0.15);
      gain.gain.linearRampToValueAtTime(0.08, now + i * 0.15 + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 8);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(now + i * 0.15);
      osc.stop(now + 9);
    });
  }

  function updateDrone(warmth, active) {
    if (reducedMotion || !active) {
      if (droneGain) droneGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      return;
    }
    if (!audioCtx) initAudio();
    if (!droneOsc) {
      droneOsc = audioCtx.createOscillator();
      droneGain = audioCtx.createGain();
      droneOsc.type = 'sine';
      droneOsc.frequency.value = 55;
      droneGain.gain.value = 0;
      droneOsc.connect(droneGain);
      droneGain.connect(masterGain);
      droneOsc.start();
    }
    droneOsc.frequency.exponentialRampToValueAtTime(55 + warmth * 30, audioCtx.currentTime + 0.3);
    droneGain.gain.exponentialRampToValueAtTime(0.02 + warmth * 0.03, audioCtx.currentTime + 0.5);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Orbit controls
  // ═══════════════════════════════════════════════════════════════════════════

  const raycaster = new THREE.Raycaster();
  raycaster.params.Points = { threshold: 0.08 };
  const pointer = new THREE.Vector2();
  let pinchDist = 0;

  const INTRO_KEYFRAMES = [
    new THREE.Vector3(0, 12, 28),
    new THREE.Vector3(14, 5, 18),
    new THREE.Vector3(-10, 2, 15),
    new THREE.Vector3(6, -2, 11),
    new THREE.Vector3(0, 0.5, 9),
  ];
  const introLookTarget = new THREE.Vector3(0, 0, 0);
  const introScratch = new THREE.Vector3();

  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
  }

  function updateCamera(dt = 0.016) {
    if (!state.introDone) {
      const t = easeInOutCubic(Math.max(0, Math.min(1, state.introPhase)));
      const lastSeg = INTRO_KEYFRAMES.length - 1;
      const seg = t * lastSeg;
      const i = Math.max(0, Math.min(lastSeg - 1, Math.floor(seg)));
      const alpha = Math.max(0, Math.min(1, seg - i));
      camera.position.lerpVectors(INTRO_KEYFRAMES[i], INTRO_KEYFRAMES[i + 1], alpha);
      introLookTarget.set(0, THREE.MathUtils.lerp(0, 1.2, Math.sin(t * Math.PI)), 0);
      camera.lookAt(introLookTarget);
      latticeGroup.rotation.y = state.introPhase * 0.35;
      state.radius = camera.position.length();
      return;
    }
    state.theta += state.velTheta;
    state.phi += state.velPhi;
    state.phi = Math.max(0.15, Math.min(Math.PI - 0.15, state.phi));
    state.velTheta *= 0.9;
    state.velPhi *= 0.9;
    state.radius += (state.targetRadius - state.radius) * Math.min(1, dt * 4);

    camera.position.x = state.radius * Math.sin(state.phi) * Math.sin(state.theta);
    camera.position.y = state.radius * Math.cos(state.phi);
    camera.position.z = state.radius * Math.sin(state.phi) * Math.cos(state.theta);
    camera.lookAt(0, 0, 0);

    const zoomNorm = 1 - (state.radius - 2.8) / (14 - 2.8);
    camera.fov = THREE.MathUtils.lerp(42, 28, Math.max(0, Math.min(1, zoomNorm)) ** 2);
    camera.updateProjectionMatrix();
  }

  let pointerDownPos = { x: 0, y: 0 };
  canvas.addEventListener('pointerdown', (e) => {
    initAudio();
    state.dragging = true;
    canvas.classList.add('dragging');
    state.lastPointer = { x: e.clientX, y: e.clientY };
    pointerDownPos = { x: e.clientX, y: e.clientY };
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', (e) => {
    pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;

    if (state.dragging && state.introDone) {
      const dx = e.clientX - state.lastPointer.x;
      const dy = e.clientY - state.lastPointer.y;
      state.velTheta -= dx * 0.003;
      state.velPhi += dy * 0.003;
      state.lastPointer = { x: e.clientX, y: e.clientY };
    }
  });

  canvas.addEventListener('pointerup', (e) => {
    state.dragging = false;
    canvas.classList.remove('dragging');
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}

    // Click = small movement only
    const dx = e.clientX - pointerDownPos.x;
    const dy = e.clientY - pointerDownPos.y;
    if (dx * dx + dy * dy > 36) return;

    raycaster.setFromCamera(pointer, camera);
    const intersects = raycaster.intersectObject(nodeMesh);
    if (intersects.length > 0) {
      engageNode(intersects[0].instanceId);
    }
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    state.targetRadius = Math.max(2.8, Math.min(14, state.targetRadius + e.deltaY * 0.008));
    if (state.introDone) state.introDone = true;
  }, { passive: false });

  // Touch pinch
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) pinchDist = getTouchDist(e.touches);
  });
  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      const d = getTouchDist(e.touches);
      state.targetRadius = Math.max(2.8, Math.min(14, state.targetRadius + (pinchDist - d) * 0.02));
      pinchDist = d;
    }
  });

  function getTouchDist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Node engagement
  // ═══════════════════════════════════════════════════════════════════════════

  function showHolographicFragment(text, worldPos) {
    holoText.textContent = text;
    holoCoords.textContent = `node · ${worldPos.x.toFixed(2)}, ${worldPos.y.toFixed(2)}, ${worldPos.z.toFixed(2)}`;
    holoEl.classList.remove('show');
    void holoEl.offsetWidth;
    holoEl.classList.add('show');
    holoEl._anchor = worldPos.clone();
  }

  function processRipples(dt) {
    const SPEED = 7, DECAY = 1.6, MAX_GEN = 5;
    while (rippleQueue.length) {
      const r = rippleQueue[0];
      if (state.time - r.birthTime < r.gen / SPEED) break;
      rippleQueue.shift();
      adjacency[r.node].forEach(neighbor => {
        const heat = r.heat * 0.72;
        if (heat < 0.06) return;
        const key = r.node < neighbor ? `${r.node}-${neighbor}` : `${neighbor}-${r.node}`;
        const eid = edgeByPair.get(key);
        if (eid !== undefined) edgeRipple[eid] = Math.max(edgeRipple[eid], heat);
        if (r.gen < MAX_GEN && nodeRipple[neighbor] < heat) {
          nodeRipple[neighbor] = heat;
          nodeHeats[neighbor] = Math.max(nodeHeats[neighbor], heat * 0.85);
          rippleQueue.push({ node: neighbor, heat, gen: r.gen + 1, birthTime: state.time });
        }
      });
    }
    for (let i = 0; i < edges.length; i++) edgeRipple[i] = Math.max(0, edgeRipple[i] - dt * DECAY);
    for (let i = 0; i < nodeCount; i++) {
      nodeRipple[i] = Math.max(0, nodeRipple[i] - dt * DECAY);
      nodeHeats[i] = Math.max(nodeRipple[i], state.nodePulse[i]);
    }
    edges.forEach(([a, b], i) => {
      const r = edgeRipple[i];
      edgeRippleAttr[i*2] = r;
      edgeRippleAttr[i*2+1] = r;
    });
    edgeGeo.attributes.edgeRipple.needsUpdate = true;
    const haloHeat = haloMesh.geometry.attributes.nodeHeat;
    for (let i = 0; i < nodeCount; i++) haloHeat.setX(i, nodeHeats[i]);
    nodeMesh.geometry.attributes.nodeHeat.needsUpdate = true;
    haloHeat.needsUpdate = true;
  }

  function engageNode(idx) {
    if (idx < 0 || idx >= nodeCount) return;
    state.engagementNodes.add(idx);
    state.nodePulse[idx] = 1.0;
    nodeRipple[idx] = 1.0;
    nodeHeats[idx] = 1.0;
    rippleQueue.push({ node: idx, heat: 1.0, gen: 0, birthTime: state.time });

    const fragIdx = state.engagementNodes.size % FRAGMENTS.length;
    showHolographicFragment(FRAGMENTS[fragIdx], nodes[idx].pos);
    playChime(180 + idx * 5 + Math.random() * 50);
    checkClimax();
  }

  function showDeepMessage() {
    if (state.deepShown) return;
    state.deepShown = true;
    deepEl.textContent = DEEP_MESSAGE;
    deepEl.classList.add('show');
  }

  function showClimaxRevelation() {
    climaxEl.textContent = CLIMAX_REVELATION;
    climaxEl.classList.add('show');
    subtitleEl.textContent = 'remain';
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Presets
  // ═══════════════════════════════════════════════════════════════════════════

  function setPreset(name) {
    state.preset = name;
    controlBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.preset === name));
  }

  controlBtns.forEach(btn => {
    btn.addEventListener('click', () => setPreset(btn.dataset.preset));
  });
  setPreset('stillness');

  // ═══════════════════════════════════════════════════════════════════════════
  // Climax
  // ═══════════════════════════════════════════════════════════════════════════

  function climaxEase(t) { return 1 - Math.pow(1 - t, 3); }

  function checkClimax() {
    if (state.climaxPlayed) return;
    const deepZoom = state.radius < 3.2;
    const enoughNodes = state.engagementNodes.size >= 5;
    const rippleEnergy = edgeRipple.reduce((a, b) => a + b, 0) / edges.length;
    const enoughDwell = state.symmetryHighFor >= 18 || state.graceContinueTime >= 45;
    if (deepZoom && enoughNodes && enoughDwell && rippleEnergy > 0.08 && state.climaxPhase === 'idle') {
      state.climaxPhase = 'converging';
      state.climaxTimer = 0;
      state.targetRadius = 2.5;
      playClimaxBloom();
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Keyboard
  // ═══════════════════════════════════════════════════════════════════════════

  const presetKeys = ['stillness', 'turning', 'light', 'grace', 'continue'];
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      state.paused = !state.paused;
    }
    if (e.key === 'r' || e.key === 'R') resetAll();
    const num = parseInt(e.key);
    if (num >= 1 && num <= 5) setPreset(presetKeys[num - 1]);
  });

  function resetAll() {
    state.engagementNodes.clear();
    state.climaxPlayed = false;
    state.climaxPhase = 'idle';
    state.climax = 0;
    state.deepShown = false;
    state.symmetryHighFor = 0;
    state.graceContinueTime = 0;
    state.targetRadius = 9;
    state.radius = 9;
    state.theta = 0.4;
    state.phi = 1.1;
    nodeHeats.fill(0);
    nodeRipple.fill(0);
    edgeRipple.fill(0);
    rippleQueue.length = 0;
    nodeMesh.geometry.attributes.nodeHeat.needsUpdate = true;
    holoEl.classList.remove('show');
    deepEl.classList.remove('show');
    climaxEl.classList.remove('show');
    subtitleEl.textContent = 'The unseen geometry that holds the turning and the light.';
    setPreset('stillness');
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Animation loop
  // ═══════════════════════════════════════════════════════════════════════════

  let lastTime = 0;
  let raycastFrame = 0;
  let lastMoveTime = performance.now();
  let coherence = 0;
  const strandLock = new Float32Array(V_LAYERS * V_STRANDS);
  state.prevPointerNdc = { x: 0, y: 0 };

  function vortexPos(n, t, stir, attn, rf, fl) {
    const base = n.home.clone();
    const r = Math.sqrt(base.x * base.x + base.z * base.z) || 0.001;
    const layer = Math.max(0, n.layer);
    const precess = t * (0.22 + fl * 1.6) * (layer % 2 === 0 ? 1 : -1);
    const rot = precess + n.phase * 0.6;
    const x0 = Math.cos(rot) * r;
    const z0 = Math.sin(rot) * r;
    const tt = (n.phase / (Math.PI * 2)) % 1;
    const rdg = ridge(fbm({ x: tt * rf * 3.9 + layer * 1.3, y: t * 0.07 * fl + 7 }, 4));
    const radJ = (rdg - 0.5) * (0.18 + rf * 0.04) * (0.7 + layer * 0.08);
    const yJ = (fbm({ x: tt * 5.2 + 11, y: t * 0.04 }, 3) - 0.5) * 0.11;
    let px = x0 + (base.x / r) * radJ;
    let pz = z0 + (base.z / r) * radJ;
    let py = base.y + yJ;
    const toC = new THREE.Vector3(-px, -py, -pz);
    const d = toC.length() || 0.001;
    const lockPull = Math.max(0, (attn * 0.9 - stir * 0.7)) * 0.018 * (1.0 - layer * 0.07);
    if (lockPull > 0.0005) {
      const f = toC.multiplyScalar(lockPull / d);
      px += f.x; py += f.y; pz += f.z;
    }
    px = px * 0.985 + base.x * 0.015;
    py = py * 0.985 + base.y * 0.015;
    pz = pz * 0.985 + base.z * 0.015;
    return new THREE.Vector3(px, py, pz);
  }

  function getStir() {
    const prev = state.prevPointerNdc || (state.prevPointerNdc = { x: 0, y: 0 });
    const dx = pointer.x - prev.x;
    const dy = pointer.y - prev.y;
    prev.x = pointer.x;
    prev.y = pointer.y;
    const vel = Math.min(2.8, Math.hypot(dx, dy) * 22 + Math.abs(state.velTheta) * 3 + (state.dragging ? 0.5 : 0));
    if (vel > 0.05 || state.dragging) lastMoveTime = performance.now();
    return vel;
  }

  function animate(now) {
    requestAnimationFrame(animate);
    if (state.paused) return;

    if (!lastTime) {
      lastTime = now;
      return;
    }
    const dt = Math.max(0, Math.min((now - lastTime) / 1000, 0.05));
    lastTime = now;
    state.time += dt;

    if (reducedMotion) {
      // Reduced motion: show the single most beautiful resolved frame the vortex can reach.
      // The lattice has phase-locked, streams are laminar, crystals are bright around the quiet point.
      // This is what sustained gentle attention achieves. Still, profound.
      coherence = 0.96;
      lastMoveTime = performance.now() - 8000; // pretend long perfect stillness
    }

    if (!state.introDone) {
      state.introPhase = Math.max(0, Math.min(1, state.introPhase + dt * 0.11));
      if (state.introPhase >= 1) state.introDone = true;
    }
    processRipples(dt);

    // Blend preset
    const target = PRESETS[state.preset];
    const blendSpeed = 0.4 * dt;
    for (const key of Object.keys(target)) {
      state.presetBlend[key] += (target[key] - state.presetBlend[key]) * blendSpeed;
    }

    // Symmetry from zoom depth
    const zoomFactor = 1 - (state.radius - 2.8) / (14 - 2.8);
    state.symmetry = Math.max(0, Math.min(1, zoomFactor));
    if (state.symmetry > 0.85) {
      state.symmetryHighFor += dt;
      if (state.symmetryHighFor >= 12) showDeepMessage();
    } else {
      state.symmetryHighFor = Math.max(0, state.symmetryHighFor - dt * 0.5);
    }

    if (state.preset === 'grace' || state.preset === 'continue') {
      state.graceContinueTime += dt;
    }

    if (state.climaxPhase === 'converging') {
      state.climaxTimer += dt;
      state.climax = climaxEase(Math.min(1, state.climaxTimer / 8));
      climaxLight.intensity = state.climax * 8;
      singularityMat.uniforms.uClimax.value = state.climax;
      if (state.climax >= 1) {
        state.climaxPhase = 'hold';
        state.climaxTimer = 0;
        climaxFlash.classList.add('active');
        setTimeout(() => climaxFlash.classList.remove('active'), 1200);
        showClimaxRevelation();
        state.climaxPlayed = true;
      }
    } else if (state.climaxPhase === 'hold') {
      state.climaxTimer += dt;
      climaxLight.intensity = 10;
      state.targetTheta += dt * 0.03;
      if (state.climaxTimer >= 10) {
        state.climaxPhase = 'expanding';
        state.climaxTimer = 0;
        edges.forEach((_, i) => edgeRipple[i] = 1.0);
      }
    } else if (state.climaxPhase === 'expanding') {
      state.climaxTimer += dt;
      state.climax = Math.max(0, 1 - state.climaxTimer / 12);
      climaxLight.intensity = state.climax * 8;
      singularityMat.uniforms.uClimax.value = state.climax;
      if (state.climax <= 0) state.climaxPhase = 'idle';
    }

    checkClimax();

    // Rotation
    const rotSpeed = reducedMotion ? 0.00002 : state.presetBlend.rotSpeed;
    latticeGroup.rotation.y += rotSpeed;

    // Breathing
    const breath = state.presetBlend.breath;
    const breathScale = 1 + Math.sin(state.time * 0.4) * 0.018 * breath;
    latticeGroup.scale.setScalar(breathScale);

    scene.fog.density = 0.016 + state.symmetry * 0.024 + state.climax * 0.01;
    fogUniforms.uFogDensity.value = scene.fog.density;
    bloomPass.strength = 0.42 + state.presetBlend.warmth * 0.35 + state.climax * 0.55 + coherence * 0.15;
    bloomPass.threshold = 0.28 - state.climax * 0.08 - coherence * 0.02;
    chromaticPass.uniforms.uAmount.value = 0.0006 + state.symmetry * 0.0008 + state.climax * 0.0012;
    chromaticPass.uniforms.uClimax.value = state.climax;
    colorGradePass.uniforms.uWarmth.value = state.presetBlend.warmth;
    colorGradePass.uniforms.uSymmetry.value = state.symmetry;
    colorGradePass.uniforms.uClimax.value = state.climax;
    colorGradePass.uniforms.uTime.value = state.time;
    vignettePass.uniforms.uStrength.value = 0.52 + state.symmetry * 0.22;
    if (!reducedMotion) filmGrainPass.uniforms.uTime.value = state.time;

    const uTime = state.time;
    [edgeMat, edgeGlowMat].forEach(m => {
      m.uniforms.uTime.value = uTime;
      m.uniforms.uBreath.value = breath;
      m.uniforms.uWarmth.value = state.presetBlend.warmth;
      m.uniforms.uSymmetry.value = state.symmetry;
      m.uniforms.uClimax.value = state.climax;
      m.uniforms.uCoherence.value = coherence;
      m.uniforms.uFogDensity.value = fogUniforms.uFogDensity.value;
    });
    nodeMat.uniforms.uTime.value = uTime;
    nodeMat.uniforms.uBreath.value = breath;
    nodeMat.uniforms.uWarmth.value = state.presetBlend.warmth;
    nodeMat.uniforms.uClimax.value = state.climax;
    nodeMat.uniforms.uFogDensity.value = fogUniforms.uFogDensity.value;
    haloMat.uniforms.uTime.value = uTime;
    haloMat.uniforms.uWarmth.value = state.presetBlend.warmth;
    haloMat.uniforms.uClimax.value = state.climax;
    singularityMat.uniforms.uTime.value = uTime;
    singularity.rotation.y += dt * 0.15;
    singularity.rotation.x = Math.sin(state.time * 0.3) * 0.2;
    voidSky.material.uniforms.uTime.value = uTime;
    voidSky.material.uniforms.uWarmth.value = state.presetBlend.warmth;
    coronaMat.uniforms.uTime.value = uTime;
    coronaMat.uniforms.uClimax.value = state.climax;
    coronaMat.uniforms.uCoherence.value = coherence;
    coherenceRingMat.uniforms.uTime.value = uTime;
    coherenceRingMat.uniforms.uCoherence.value = coherence;
    sparkleMat.uniforms.uTime.value = uTime;
    sparkleMat.uniforms.uCoherence.value = coherence;
    cathedralShells.forEach((s, i) => {
      s.rotation.y += dt * (0.02 + i * 0.008);
      s.material.uniforms.uTime.value = uTime;
      s.material.uniforms.uWarmth.value = state.presetBlend.warmth;
      s.material.uniforms.uSymmetry.value = state.symmetry;
    });
    dustLayers.forEach(d => {
      d.material.uniforms.uTime.value = uTime;
      d.material.uniforms.uParticleSpeed.value = state.presetBlend.particleSpeed;
      d.material.uniforms.uWarmth.value = state.presetBlend.warmth;
      d.material.uniforms.uFogDensity.value = fogUniforms.uFogDensity.value;
    });

    // Lights respond to preset + slow orbit
    const lorbit = state.time * 0.22;
    lightGold.intensity = 1.4 * state.presetBlend.gold + coherence * 0.6;
    lightViolet.intensity = 0.9 * state.presetBlend.violet;
    lightRose.intensity = 0.65 * state.presetBlend.warmth;
    lightViolet.position.set(Math.cos(lorbit) * 5, 3 + Math.sin(state.time * 0.15) * 0.8, Math.sin(lorbit) * 5);
    lightRose.position.set(Math.sin(lorbit * 0.7) * 4, -2 + Math.cos(state.time * 0.18) * 0.6, Math.cos(lorbit * 0.7) * 4);

    // Node pulse decay
    let heatDirty = false;
    for (let i = 0; i < nodeCount; i++) {
      if (state.nodePulse[i] > 0) {
        state.nodePulse[i] = Math.max(0, state.nodePulse[i] - dt * 0.8);
        nodeHeats[i] = state.nodePulse[i];
        heatDirty = true;
      }
    }
    if (heatDirty) nodeMesh.geometry.attributes.nodeHeat.needsUpdate = true;

    // Raycast hover (throttled)
    raycastFrame++;
    if (raycastFrame % 2 === 0 && state.introDone) {
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(nodeMesh);
      const prev = state.hoveredNode;
      state.hoveredNode = hits.length > 0 ? hits[0].instanceId : -1;
      if (state.hoveredNode !== prev && state.hoveredNode >= 0) {
        state.nodePulse[state.hoveredNode] = Math.max(state.nodePulse[state.hoveredNode], 0.4);
        nodeHeats[state.hoveredNode] = 0.4;
        nodeMesh.geometry.attributes.nodeHeat.needsUpdate = true;
      }
    }

    const stir = getStir();
    nodes.forEach((n, i) => {
    const now = performance.now();
    const stillMs = now - lastMoveTime;
    const attn = (state.presetBlend ? (state.presetBlend.gold * 0.6 + 0.55) : 0.85) * (1.0 - Math.min(1, stir * 0.6));

    // coherence builds only on sustained stillness + decent attn
    const wantLock = (stillMs > 1350 && stir < 0.55 && attn > 0.58) ? 1 : 0;
    coherence = coherence * 0.94 + wantLock * 0.06;

    // Update strand lock factors
    const l = Math.max(0, n.layer);
    const st = (n.phase / (Math.PI * 2)) % 1;
    const sIdx = (l * V_STRANDS + Math.floor(st * V_STRANDS)) % (V_LAYERS * V_STRANDS);
    strandLock[sIdx] = strandLock[sIdx] * 0.965 + (wantLock ? 0.035 : -0.012);
    strandLock[sIdx] = Math.max(0, Math.min(1, strandLock[sIdx]));

    const lock = strandLock[sIdx];
    const rf = (state.presetBlend ? state.presetBlend.violet * 1.8 + 1.4 : 2.1);
    const fl = (state.presetBlend ? state.presetBlend.particleSpeed * 0.9 + 0.18 : 0.28);

    const target = vortexPos(n, state.time, stir, attn, rf, fl);

    // When locked, pull even harder toward a "perfect" common phase around the point
    if (lock > 0.6) {
      const toCenter = new THREE.Vector3(-target.x, -target.y, -target.z).normalize().multiplyScalar(lock * 0.009);
      target.add(toCenter);
    }

    n.pos.copy(target);

    // visual pulse from heat + lock crystals
    const heat = (n.heat || 0) * 0.7 + lock * 0.9;
    state.nodePulse[i] = heat;

    dummy.position.copy(target);
    const sc = 1.0 + lock * 0.55 + heat * 0.35;
    dummy.scale.setScalar(sc);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);
    haloMesh.setMatrixAt(i, dummy.matrix);
  });
  nodeMesh.instanceMatrix.needsUpdate = true;
  haloMesh.instanceMatrix.needsUpdate = true;

  // Stream particles — the visible aether flowing into the attempt.
  // They follow helical projections of the ridge field and get sucked to the point on high coherence.
  if (moteGroup && moteGroup.children.length > 8) {
    const stir = getStir();
    const attn = Math.max(0.3, 1.0 - stir * 0.65);
    moteGroup.children.forEach((m, mi) => {
      const ud = m.userData;
      const layer = ud.layer || (mi % 5);
      const radBase = 0.7 + layer * 0.38;
      const ang = (mi * 1.7 + state.time * (0.6 + layer * 0.4)) % (Math.PI * 2);
      const tt = ((mi * 0.13) % 1);
      const rdg = ridge(fbm({ x: tt * 3.8 + layer, y: state.time * 0.05 }, 3));
      let r = radBase * (0.82 + rdg * 0.36);
      let y = (tt - 0.5) * (2.1 - layer * 0.2) + Math.sin(mi) * 0.2;

      const p = new THREE.Vector3(Math.cos(ang) * r, y, Math.sin(ang) * r);

      // On high coherence the streams become laminar and accelerate into the point
      if (coherence > 0.35) {
        const toC = new THREE.Vector3(-p.x, -p.y, -p.z).normalize().multiplyScalar(coherence * 0.028 * attn);
        p.add(toC);
        m.scale.setScalar(0.6 + coherence * 0.9);
        m.material.uniforms.uCoherence.value = coherence;
      } else {
        m.scale.setScalar(0.9);
        m.material.uniforms.uCoherence.value = 0.15 + 0.25 * (0.5 + 0.5 * Math.sin(state.time * 2 + mi));
      }
      m.material.uniforms.uTime.value = state.time;
      m.position.copy(p);
    });
  }

    if (raycastFrame % 2 === 0 || state.climax > 0) {
      const posAttr = edgeGeo.attributes.position;
      edges.forEach(([a, b], i) => {
        posAttr.setXYZ(i * 2, nodes[a].pos.x, nodes[a].pos.y, nodes[a].pos.z);
        posAttr.setXYZ(i * 2 + 1, nodes[b].pos.x, nodes[b].pos.y, nodes[b].pos.z);
      });
      posAttr.needsUpdate = true;
    }

    if (holoEl.classList.contains('show') && holoEl._anchor) {
      holoWorld.copy(holoEl._anchor).project(camera);
      const x = (holoWorld.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-holoWorld.y * 0.5 + 0.5) * window.innerHeight;
      holoEl.style.left = `${x}px`;
      holoEl.style.top = `${y - 90}px`;
      holoEl.style.transform = 'translate(-50%, -50%)';
    }

    // Vortex stream particles (the aether the lattice is attempting to resolve into the point)
    // Repositioned every frame inside the main vortex nodes update block above when coherence is active.
    // Fallback gentle motion if the block didn't catch them.
    moteGroup.children.forEach((mote, mi) => {
      if (!mote.userData.vortex) {
        const t = state.time * 0.9 + mi;
        const r = 1.6 + (mi % 5) * 0.35;
        mote.position.set(Math.cos(t + mi) * r * 0.6, Math.sin(t * 0.6) * 0.8, Math.sin(t + mi * 1.3) * r * 0.6);
        mote.material.uniforms.uCoherence.value = 0.1 + 0.15 * Math.sin(t * 1.7);
      }
    });

    // Drone
    updateDrone(state.presetBlend.warmth, state.preset === 'grace' || state.climax > 0.1);

    updateCamera(dt);
    composer.render();
  }

  requestAnimationFrame(animate);

  // Resize
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    composer.setSize(w, h);
    bloomPass.resolution.set(w * (isMobile ? 0.5 : 1), h * (isMobile ? 0.5 : 1));
  });

  // Cleanup
  window.addEventListener('beforeunload', () => {
    renderer.dispose();
    edgeGeo.dispose();
    edgeMat.dispose();
    mergedNodeGeo.dispose();
    nodeMat.dispose();
    dustLayers.forEach(d => { d.geometry.dispose(); d.material.dispose(); });
    composer.dispose();
    if (audioCtx) audioCtx.close();
  });
  </script>
</body>
</html>
